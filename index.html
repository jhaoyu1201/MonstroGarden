function selectBreedParent(slot){
  let html=`<p style="font-size:.85rem;color:var(--text2);margin-bottom:12px;">選擇父母 ${slot.toUpperCase()}</p><div class="monster-grid">`;
  G.monsters.forEach(m=>{const other=slot==='a'?breedParentB:breedParentA;if(other&&other.uid===m.uid)return;html+=`<div class="monster-card rarity-${SPECIES[m.speciesId].rarity}" onclick="setBreedParent('${slot}',${m.uid})"><canvas width="60" height="60" id="bpc-${m.uid}"></canvas><div class="m-name" style="font-size:.8rem;">${m.nickname||m.name}</div><div class="m-level">Lv.${m.level}</div></div>`;});html+='</div>';
  showModal(`選擇父母 ${slot.toUpperCase()}`,html,()=>{G.monsters.forEach(m=>{const c=document.getElementById('bpc-'+m.uid);if(c)drawMiniMonsterFull(m,c);});});
}
function setBreedParent(slot,uid){const m=G.monsters.find(x=>x.uid===uid);if(slot==='a')breedParentA=m;else breedParentB=m;closeModal();renderBreeding();}

function renderBreeding(){
  const sa=document.getElementById('breed-slot-a'),sb=document.getElementById('breed-slot-b');
  if(breedParentA){const c=document.createElement('canvas');c.width=70;c.height=70;drawMiniMonsterFull(breedParentA,c);sa.innerHTML='';sa.appendChild(c);sa.innerHTML+=`<div style="font-weight:800;font-size:.85rem;">${breedParentA.nickname||breedParentA.name}</div><div style="font-size:.75rem;color:var(--text2);">Lv.${breedParentA.level}</div>`;sa.className='breed-slot filled';}
  else{sa.innerHTML='<span style="font-size:2rem;">💫</span><span style="color:var(--text2);font-size:.85rem;">選擇父母 A</span>';sa.className='breed-slot';}
  if(breedParentB){const c=document.createElement('canvas');c.width=70;c.height=70;drawMiniMonsterFull(breedParentB,c);sb.innerHTML='';sb.appendChild(c);sb.innerHTML+=`<div style="font-weight:800;font-size:.85rem;">${breedParentB.nickname||breedParentB.name}</div><div style="font-size:.75rem;color:var(--text2);">Lv.${breedParentB.level}</div>`;sb.className='breed-slot filled';}
  else{sb.innerHTML='<span style="font-size:2rem;">💫</span><span style="color:var(--text2);font-size:.85rem;">選擇父母 B</span>';sb.className='breed-slot';}
  renderBreedingEggs();
}

function startBreeding(){
  if(!breedParentA||!breedParentB){notify('需要選兩隻怪物！','warn');return;}
  if(G.breedingSlots.length>=3){notify('育種槽已滿！','warn');return;}
  if(G.monsters.length>=50){notify('倉庫已滿！','warn');return;}
  const useDrug=G.inventory.drug>0&&confirm(`使用幻想藥？（色違機率→3%）\n幻想藥剩餘：${G.inventory.drug}`);
  if(useDrug){G.inventory.drug--;updateInventoryChips();}
  G.breedingSlots.push({a:breedParentA.uid,b:breedParentB.uid,startTime:Date.now(),duration:(BATTLE_CONFIG.breedDuration||30)*1000,usedDrug:useDrug,spA:breedParentA.speciesId,spB:breedParentB.speciesId});
  SFX.breed();notify('💕 配種開始！30秒後取蛋','teal');breedParentA=null;breedParentB=null;renderBreeding();saveGame();
}

function renderBreedingEggs(){
  const cont=document.getElementById('breeding-eggs');cont.innerHTML='';
  if(!G.breedingSlots.length){cont.innerHTML='<div style="text-align:center;padding:16px;color:var(--text2);font-size:.85rem;">暫無配種中的蛋</div>';return;}
  G.breedingSlots.forEach((slot,idx)=>{
    const now=Date.now();const pct=Math.min(100,Math.round((now-slot.startTime)/slot.duration*100));const done=now-slot.startTime>=slot.duration;
    const aM=G.monsters.find(x=>x.uid===slot.a),bM=G.monsters.find(x=>x.uid===slot.b);
    const div=document.createElement('div');div.className='egg-progress';
    div.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;"><div><span style="font-size:1.2rem;">🥚</span><span style="font-weight:700;margin-left:6px;">${aM?aM.name:'?'} × ${bM?bM.name:'?'}</span>${slot.usedDrug?'<span style="color:var(--gold);font-size:.75rem;margin-left:6px;">✨幻想藥</span>':''}</div>${done?`<button class="btn btn-gold" style="font-size:.8rem;padding:6px 14px;" onclick="hatchEgg(${idx})">🥚 孵化！</button>`:`<span style="font-size:.8rem;color:var(--text2);">${pct}%</span>`}</div><div class="progress-bar-bg"><div class="progress-bar" style="width:${pct}%;"></div></div>`;
    cont.appendChild(div);
  });
}

function hatchEgg(idx){
  if(G.monsters.length>=50){notify('倉庫已滿！','warn');return;}
  const slot=G.breedingSlots[idx];
  const spId=Math.random()<0.5?slot.spA:slot.spB;
  const shiny=Math.random()<(slot.usedDrug?(BATTLE_CONFIG.shinyDrugChance||0.03):(BATTLE_CONFIG.shinyChance||0.01));
  const pA=G.monsters.find(x=>x.uid===slot.a),pB=G.monsters.find(x=>x.uid===slot.b);
  const baby=generateMonster(spId,1,shiny,pA,pB);
  G.monsters.push(baby);G.breedingSlots.splice(idx,1);
  if(shiny){SFX.shiny();notify(`🌈 色違 ${SPECIES[spId].name} 誕生！`,'teal');}else{SFX.hatch();notify(`🥚 孵化出 ${SPECIES[spId].name}！`,'teal');}
  renderBreeding();renderPokedex();saveGame();
}

      🍬${G.inventory.food} · 💊${G.inventory.potion} · 🥚${G.inventory.specialEgg} · 🔮${G.inventory.drug} · 🍎${G.inventory.bondFruit||0}

function buyItem(id){const item=SHOP_ITEMS.find(x=>x.id===id);if(!item||G.stardust<item.price){SFX.click();return;}G.stardust-=item.price;G.inventory[item.key]++;SFX.buy();notify(`✅ 購買了 ${item.name}！`,'teal');updateStardust();updateInventoryChips();renderShop();saveGame();}

function hatchSpecialEgg(itemId){
  itemId=itemId||'specialEgg';
  const item=SHOP_CONFIG.find(x=>x.id===itemId)||SHOP_CONFIG.find(x=>x.type==='egg');
  if(!item||!G.inventory[item.key]||G.inventory[item.key]<=0||G.monsters.length>=50)return;
  G.inventory[item.key]--;updateInventoryChips();
  const pool=SPECIES.filter(s=>s.evoFrom===null);const w=pool.map(s=>[1,3,2,1.5,0.8,0.3][s.rarity]);const total=w.reduce((a,b)=>a+b,0);let r=Math.random()*total;let sp=pool[0];for(let i=0;i<pool.length;i++){r-=w[i];if(r<=0){sp=pool[i];break;}}
  const m=generateMonster(sp.id,1,Math.random()<((BATTLE_CONFIG.shinyChance||0.01)*2));G.monsters.push(m);if(m.isShiny){SFX.shiny();}else{SFX.hatch();}notify(`🥚 孵化出 ${m.isShiny?'✨色違 ':''}${sp.name}！`,'teal');renderShop();renderPokedex();saveGame();
}

function renderPokedex(){
  const total=SPECIES.length;
  document.getElementById('dex-count').textContent=devMode?`(${total}/${total} 🛠)`:`(${G.discovered.size}/${total})`;
  const grid=document.getElementById('pokedex-grid');grid.innerHTML='';
  SPECIES.forEach(sp=>{
    const disc=devMode||G.discovered.has(sp.id);
    // Find highest level owned monster of this species to show best evo stage
    const ownedOfSp=G.monsters.filter(m=>m.speciesId===sp.id);
    const bestOwned=ownedOfSp.length?ownedOfSp.reduce((a,b)=>a.level>b.level?a:b):null;
    // Also check if any evolution of this species chain is owned and show that stage
    const displayMon=bestOwned||{speciesId:sp.id,isShiny:false,size:1.0,level:1};
    const hasShiny=ownedOfSp.some(m=>m.isShiny);
    const div=document.createElement('div');
    div.className='dex-entry'+(disc?'':' undiscovered')+(hasShiny?' shiny':'');
    div.style.position='relative';
    div.onclick=()=>disc&&openDexDetail(sp.id);
    const stageLabel=disc&&bestOwned?['','Ⅰ','Ⅱ'][getEvoStage(bestOwned)]:'';
    div.innerHTML+=`<div id="dcan-${sp.id}" style="display:flex;justify-content:center;height:70px;position:relative;"></div><div class="dex-name">${disc?sp.name:'???'}</div><div style="font-size:.65rem;color:${RARITY_COLORS[sp.rarity]};margin-top:1px;">${disc?'⭐'.repeat(sp.rarity):'⭐?'}${stageLabel?` <span style="color:var(--teal);font-weight:800;">${stageLabel}</span>`:''}</div>`;
    grid.appendChild(div);
    const dwrap=document.getElementById('dcan-'+sp.id);
    if(dwrap){
      const can=document.createElement('canvas');can.width=70;can.height=70;
      dwrap.appendChild(can);
      if(disc){
        drawMiniMonsterFull(displayMon,can);
      } else {
        const ctx=can.getContext('2d');ctx.fillStyle='#333';
        ctx.beginPath();ctx.ellipse(35,42,22,26,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#555';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('?',35,42);
      }
    }
  });
}

function openDexDetail(spId){
  const sp=SPECIES[spId];
  // Collect all monsters in evolution chain
  let chainRoot=sp;while(chainRoot.evoFrom!==null)chainRoot=SPECIES[chainRoot.evoFrom];
  const chain=[];let cur=chainRoot;chain.push(cur);while(cur.evoTo!==null){cur=SPECIES[cur.evoTo];chain.push(cur);}
  // owned monsters across the whole chain
  const ownedAll=G.monsters.filter(m=>chain.some(s=>s.id===m.speciesId));
  const ownedThis=G.monsters.filter(m=>m.speciesId===spId);
  const bestOwned=ownedAll.length?ownedAll.reduce((a,b)=>a.level>b.level?a:b):null;
  const hasShiny=ownedAll.some(m=>m.isShiny);

  // Build stage rows for the chain (up to 3 stages)
  const stages=chain.map((s,i)=>{
    const lvReq=i===0?1:i===1?10:20;
    // Check if player has unlocked this stage
    const unlocked=G.discovered.has(s.id);
    return{sp:s,lvReq,unlocked,index:i};
  });

  const atkTypeMap={melee:['atktype_melee','⚔️','近戰'],ranged:['atktype_ranged','🏹','遠程'],area:['atktype_area','💥','範圍']};
  const [atkKey,atkEmoji,atkLabel]=atkTypeMap[sp.atkType]||['','',''];
  const atkTypeName=`${getIconHtml(ASSET_CONFIG.uiDir+atkKey+'.png',atkEmoji,16,16)} ${atkLabel}`;

  const html=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      ${attrBadgeHtml(sp.attr)}
      <span style="color:${RARITY_COLORS[sp.rarity]};font-size:.85rem;font-weight:700;">${'⭐'.repeat(sp.rarity)} ${RARITY_NAMES[sp.rarity]}</span>
      ${hasShiny?'<span style="color:var(--gold);font-size:.8rem;">✨ 已獲得色違</span>':''}
    </div>
    <div style="font-size:.82rem;color:var(--text2);margin-bottom:14px;">
      ${atkTypeName} &nbsp;·&nbsp; 持有 ${ownedThis.length} 隻&nbsp;·&nbsp; 鏈中共 ${ownedAll.length} 隻
    </div>
    <div style="font-weight:800;font-size:.85rem;color:var(--teal);margin-bottom:8px;">📊 基礎數值</div>
    <div style="margin-bottom:14px;">
      <div class="stat-row"><span class="stat-label">HP</span><div class="stat-bar-bg"><div class="stat-bar" style="width:${Math.min(100,sp.baseHP/1.3)}%;background:#4ecb71;"></div></div><span class="stat-val">${sp.baseHP}</span></div>
      <div class="stat-row"><span class="stat-label">ATK</span><div class="stat-bar-bg"><div class="stat-bar" style="width:${Math.min(100,sp.baseATK*2.5)}%;background:#ff6b35;"></div></div><span class="stat-val">${sp.baseATK}</span></div>
      <div class="stat-row"><span class="stat-label">DEF</span><div class="stat-bar-bg"><div class="stat-bar" style="width:${Math.min(100,sp.baseDEF*2.5)}%;background:#4a9eff;"></div></div><span class="stat-val">${sp.baseDEF}</span></div>
      <div class="stat-row"><span class="stat-label">AGI</span><div class="stat-bar-bg"><div class="stat-bar" style="width:${Math.min(100,sp.baseAGI*2.5)}%;background:#ffd700;"></div></div><span class="stat-val">${sp.baseAGI}</span></div>
      <div class="stat-row"><span class="stat-label">SPD</span><div class="stat-bar-bg"><div class="stat-bar" style="width:${Math.min(100,sp.baseSPD*2.5)}%;background:#8b5cf6;"></div></div><span class="stat-val">${sp.baseSPD}</span></div>
    </div>
    <div style="font-weight:800;font-size:.85rem;color:var(--teal);margin-bottom:10px;">🔄 進化外觀</div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;" id="dex-evo-row"></div>
    ${ownedAll.length>0?`<div style="margin-top:14px;"><div style="font-weight:800;font-size:.85rem;color:var(--teal);margin-bottom:8px;">👾 我的個體</div><div style="display:flex;gap:8px;flex-wrap:wrap;" id="dex-owned-row"></div></div>`:''}
  `;

  showModal(sp.name+' 詳細',html,()=>{
    // Draw evolution chain stages
    const evoRow=document.getElementById('dex-evo-row');
    if(evoRow){
      stages.forEach((stage,i)=>{
        const wrap=document.createElement('div');
        wrap.style.cssText=`text-align:center;background:var(--card);border-radius:10px;padding:8px 10px;border:1.5px solid ${stage.unlocked?'var(--teal)':'var(--card2)'};flex:1;min-width:80px;position:relative;`;
        const lvLabels=['Lv.1','Lv.10','Lv.20'];
        // Canvas
        const can=document.createElement('canvas');can.width=80;can.height=80;
        const ctx=can.getContext('2d');ctx.clearRect(0,0,80,80);
        if(stage.unlocked){
          // Use best owned of this stage's speciesId if available, else fake
          // Always force level=1 so getEvoStage returns 0 → idle sprite of this species
          const ownedStage=G.monsters.filter(m=>m.speciesId===stage.sp.id);
          const bestOfStage=ownedStage.length?ownedStage.reduce((a,b)=>a.level>b.level?a:b):null;
          const drawMon={speciesId:stage.sp.id,isShiny:bestOfStage?bestOfStage.isShiny:false,size:1.0,level:1,glowDNA:bestOfStage?bestOfStage.glowDNA:undefined};
          drawMiniMonsterFull(drawMon,can);
        } else {
          // Locked - silhouette: always use idle (stage 0) of that species
          const fakeMon={speciesId:stage.sp.id,isShiny:false,size:1.0,level:1};
          const stSp=stage.sp;
          const stStage=0;
          const spritePath=stSp?getSpritePath(stSp,stStage,false,false,false):null;
          const drawLocked=(img)=>{
            ctx.clearRect(0,0,80,80);
            ctx.save();
            ctx.filter='brightness(0)';
            if(img){
              const scale=Math.min(80/img.width,80/img.height)*0.88;
              const dw=img.width*scale,dh=img.height*scale;
              ctx.drawImage(img,(80-dw)/2,(80-dh)/2,dw,dh);
            } else {
              drawMonsterOnCanvas(ctx,fakeMon,40,46,1.0,false,'happy');
            }
            ctx.restore();
            ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,80,80);
            ctx.font='bold 13px Nunito,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
            ctx.fillStyle='#6b7ab5';ctx.fillText('？未解鎖',40,40);
          };
          if(spritePath) loadImg(spritePath,drawLocked);
          else drawLocked(null);
        }
        wrap.appendChild(can);
        // Labels AFTER canvas (no innerHTML+= trick here, use insertAdjacentHTML)
        const nameEl=document.createElement('div');
        nameEl.style.cssText='font-size:.72rem;font-weight:800;margin-top:4px;';
        nameEl.textContent=stage.unlocked?stage.sp.name:'???';
        const lvEl=document.createElement('div');
        lvEl.style.cssText=`font-size:.65rem;color:${stage.unlocked?'var(--teal)':'var(--text3)'};margin-top:2px;`;
        lvEl.textContent=lvLabels[i];
        wrap.appendChild(nameEl);wrap.appendChild(lvEl);
        // Arrow between stages
        if(i<stages.length-1){
          const arrow=document.createElement('div');
          arrow.style.cssText='display:flex;align-items:center;font-size:1.2rem;color:var(--teal);padding-top:30px;';
          arrow.textContent='→';
          evoRow.appendChild(wrap);evoRow.appendChild(arrow);
        } else {
          evoRow.appendChild(wrap);
        }
      });
    }

    // Draw owned individuals
    const ownedRow=document.getElementById('dex-owned-row');
    if(ownedRow&&ownedAll.length){
      ownedAll.slice(0,6).forEach(m=>{
        const card=document.createElement('div');
        card.style.cssText='text-align:center;background:var(--card2);border-radius:8px;padding:6px 8px;cursor:pointer;min-width:70px;';
        card.onclick=()=>{closeModal();setTimeout(()=>openMonsterDetail(m),100);};
        const oc=document.createElement('canvas');oc.width=60;oc.height=60;
        const octx=oc.getContext('2d');octx.clearRect(0,0,60,60);
        drawMonsterOnCanvas(octx,m,30,34,1.0,false,'happy');
        card.appendChild(oc);
        const nl=document.createElement('div');nl.style.cssText='font-size:.68rem;font-weight:700;margin-top:3px;';nl.textContent=m.nickname||m.name;
        const ll=document.createElement('div');ll.style.cssText='font-size:.62rem;color:var(--text2);';ll.textContent=`Lv.${m.level}${m.isShiny?' ✨':''}`;
        card.appendChild(nl);card.appendChild(ll);
        ownedRow.appendChild(card);
      });
      if(ownedAll.length>6){
        const more=document.createElement('div');
        more.style.cssText='display:flex;align-items:center;font-size:.75rem;color:var(--text2);padding:4px;';
        more.textContent=`+${ownedAll.length-6} 隻`;
        ownedRow.appendChild(more);
      }
    }
  });
}

function saveGame(){const data={stardust:G.stardust,nextId:G.nextId,monsters:G.monsters,terrarium:G.terrarium,discovered:[...G.discovered],breedingSlots:G.breedingSlots,inventory:G.inventory,battleCooldowns:G.battleCooldowns,usedCodes:G.usedCodes,savedAt:Date.now()};try{localStorage.setItem('mg2_save',JSON.stringify(data));}catch(e){}}
function loadGame(){try{const raw=localStorage.getItem('mg2_save');if(!raw)return false;const d=JSON.parse(raw);G.stardust=d.stardust||500;G.nextId=d.nextId||1;G.monsters=d.monsters||[];G.terrarium=d.terrarium||[];G.discovered=new Set(d.discovered||[]);G.breedingSlots=d.breedingSlots||[];G.inventory=d.inventory||{food:5,potion:2,specialEgg:1,drug:0,bondFruit:0};G.battleCooldowns=d.battleCooldowns||{};G.usedCodes=d.usedCodes||[];
  if(G.inventory.bondFruit===undefined)G.inventory.bondFruit=0;
  // 舊存檔遷移：補充被動槽位欄位
  if(typeof initPassiveSlots==='function'){
    G.monsters.forEach(m=>{if(m.passiveInnate===undefined){m.passiveInnate=null;m.passiveFreeA=null;m.passiveFreeB=null;initPassiveSlots(m,null,null);}});
  }
  // 舊存檔遷移：補充羈絆欄位
  G.monsters.forEach(m=>{if(m.bondFruit===undefined){m.bondFruit=false;m.bondWins=0;m.glowDNA=null;m.bondTitle='';}});
  return true;}catch(e){return false;}}
function exportSave(){saveGame();const raw=localStorage.getItem('mg2_save');const code=btoa(encodeURIComponent(raw));showModal('匯出存檔',`<p style="font-size:.85rem;color:var(--text2);margin-bottom:10px;">複製以下代碼：</p><textarea style="width:100%;height:120px;background:var(--card);color:var(--text);border:1px solid var(--card2);border-radius:8px;padding:8px;font-size:.72rem;font-family:monospace;resize:none;" readonly onclick="this.select()">${code}</textarea><button class="btn btn-primary" style="margin-top:10px;width:100%;" onclick="navigator.clipboard.writeText(document.querySelector('textarea').value).then(()=>notify('已複製！','teal'))">📋 複製</button>`);}
function redeemCode(){
  const input=prompt('輸入兌換碼：');if(!input)return;
  const key=input.trim().toUpperCase();
  const r=REDEEM_CODES[key];
  if(!r){notify('❌ 無效的兌換碼！','warn');return;}
  if(G.usedCodes.includes(key)){notify('❌ 此兌換碼已使用過！','warn');return;}
  G.usedCodes.push(key);
  function applyReward(rw){
    if(rw.type==='stardust'){G.stardust+=rw.amount;updateStardust();}
    else if(rw.type==='item'){G.inventory[rw.key]=(G.inventory[rw.key]||0)+rw.amount;}
    else if(rw.type==='monster'){if(G.monsters.length<50){const m=generateMonster(rw.speciesId,rw.level||1,!!rw.shiny);if(rw.withGlow){m.glowDNA=generateGlowDNA();m.bondTitle=generateBondTitle(m,m.glowDNA);m.bondWins=20;}G.monsters.push(m);}}
  }
  if(r.type==='bundle'){r.rewards.forEach(applyReward);}
  else{applyReward(r);}
  notify(`🎁 兌換成功！${r.desc}`,'teal');
  saveGame();closeModal();
}
function importSave(){const code=prompt('貼上存檔代碼：');if(!code)return;try{const raw=decodeURIComponent(atob(code.trim()));JSON.parse(raw);localStorage.setItem('mg2_save',raw);loadGame();initAll();notify('✅ 匯入成功！','teal');}catch(e){notify('❌ 代碼無效！','warn');}}
function showSaveMenu(){
  const u=fbAuth.currentUser;
  showModal('💾 存檔管理',`<div style="display:flex;flex-direction:column;gap:10px;">
    <div style="background:var(--card2);border-radius:10px;padding:10px;display:flex;align-items:center;justify-content:space-between;">
      <div>${fbUserLabel()}</div>
      <button class="btn" style="padding:4px 12px;font-size:.75rem;" onclick="closeModal();showAuthModal();">${u?'管理帳號':'登入 / 註冊'}</button>
    </div>
    <button class="btn btn-primary" onclick="smartSave()">💾 儲存${u?'（已登入・自動同步雲端）':'（本機）'}</button>
    <hr>
    <button class="btn btn-secondary" onclick="exportSave()">📤 匯出存檔代碼</button>
    <button class="btn btn-secondary" onclick="importSave()">📥 匯入存檔代碼</button>
    <hr>
    <button class="btn btn-danger" onclick="if(confirm('確定重置？所有進度消失！')){localStorage.removeItem('mg2_save');location.reload();}">🗑️ 重置遊戲</button>
  </div>`);
}
async function smartSave(){
  const user=fbAuth.currentUser;
  if(user){await cloudSave();}
  else{saveGame();notify('💾 已儲存（本機）！','teal');}
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  SFX.pageSwitch();

  const bgmScene=id==='battle'?'battle':id==='terrarium'?'terrarium':'ambient';
  if(bgmScene!==currentBGMScene){currentBGMScene=bgmScene;try{startBGM(bgmScene);}catch(e){}}

  // 戰鬥進行中：不殺死 battleLoop，只讓它在背景繼續跑
  const isBattling = battleState && !battleState.over;

  if(id==='terrarium'){
    // 只有不在戰鬥時才取消 battleAnimFrame
    if(!isBattling && battleAnimFrame){ cancelAnimationFrame(battleAnimFrame); battleAnimFrame=null; }
    updateTerrariumUI();
    setTimeout(()=>{
      initTerrariumObjs();
      if(terrariumAnimFrame) cancelAnimationFrame(terrariumAnimFrame);
      animateTerrariumLoop();
    }, 50);
  } else {
    if(terrariumAnimFrame){ cancelAnimationFrame(terrariumAnimFrame); terrariumAnimFrame=null; }
  }

  if(id==='battle'){
    if(isBattling){
      // 回到戰鬥頁：確保 battleLoop 還活著，顯示戰鬥場景
      if(!battleAnimFrame) battleLoop();
      document.getElementById('battle-arena').style.display='';
      document.getElementById('battle-select-screen').style.display='none';
    } else {
      renderBattleSelect();
    }
  }

  if(id==='warehouse') renderWarehouse();
  if(id==='breeding')  renderBreeding();
  if(id==='shop')      renderShop();
  if(id==='pokedex')   renderPokedex();
  if(id==='bag')       renderBag();
}
function refreshCurrentPage(){const a=document.querySelector('.page.active');if(!a)return;const id=a.id.replace('page-','');if(id==='terrarium'){updateTerrariumUI();setTimeout(()=>{initTerrariumObjs();if(terrariumAnimFrame)cancelAnimationFrame(terrariumAnimFrame);animateTerrariumLoop();},50);}if(id==='warehouse')renderWarehouse();if(id==='breeding')renderBreedingEggs();if(id==='shop')renderShop();if(id==='pokedex')renderPokedex();if(id==='bag')renderBag();}
function showModal(title,content,callback){document.getElementById('modal-box').innerHTML=`<button class="modal-close" onclick="closeModal()">✕</button><h2>${title}</h2>${content}`;document.getElementById('modal-overlay').classList.add('open');if(callback)setTimeout(callback,10);}
function closeModal(e){if(e&&e.target!==document.getElementById('modal-overlay'))return;SFX.click();document.getElementById('modal-overlay').classList.remove('open');}
function updateStardust(){
  document.getElementById('stardust-val').textContent=G.stardust;
  updateInventoryChips();
}

const BAG_ITEM_DEFS=[
  {key:'food',      name:'飼養食物',    icon:'🍬', desc:'餵食怪物，補充飽食度並獲得經驗值',                                         use:'monster'},
  {key:'potion',    name:'體力回復劑',  icon:'💊', desc:'移除怪物的戰鬥冷卻，讓牠立刻可以再次出戰',                               use:'monster'},
  {key:'bondFruit', name:'羈絆果實',    icon:'🍎', desc:'對寵物使用後進入磨合期，累積20場勝利觸發羈絆解放，獲得發光特效與稱號',   use:'monster'},
  {key:'specialEgg',name:'特殊怪物蛋',  icon:'🥚', desc:'孵化出一隻隨機稀有度的怪物',                                             use:'hatch'},
  {key:'drug',      name:'幻想藥',      icon:'🔮', desc:'育種配種時使用，提升色違機率至3%（在育種頁配種時會自動詢問）',           use:'none'},
];
function renderBag(){
  const grid=document.getElementById('bag-grid');
  grid.innerHTML='';
  BAG_ITEM_DEFS.forEach(item=>{
    const qty=G.inventory[item.key]||0;
    const iconInfo=UI_ITEM_ICONS[item.key];
    const iconHtml=iconInfo?getIconHtml(ASSET_CONFIG.uiDir+iconInfo[0]+'.png',iconInfo[1],40,40):`<span style="font-size:2.2rem;">${item.icon}</span>`;
    const card=document.createElement('div');
    card.className='bag-item-card'+(qty>0?' has-items':' empty');
    card.innerHTML=`
      <div style="font-size:2.2rem;line-height:1;">${iconHtml}</div>
      <div class="bag-item-name">${item.name}</div>
      <div class="bag-item-qty${qty===0?' zero':''}">${qty>0?'×'+qty:'已用完'}</div>
      <div class="bag-item-desc">${item.desc}</div>
      ${qty>0&&item.use!=='none'?`<button class="btn btn-primary" style="width:100%;margin-top:4px;" onclick="pickMonsterForItem('${item.key}')">使用</button>`:''}
    `;
    grid.appendChild(card);
  });
}
function pickMonsterForItem(key){
  if(key==='specialEgg'){hatchSpecialEgg();renderBag();return;}
  let candidates=G.monsters;
  if(key==='bondFruit') candidates=G.monsters.filter(m=>!m.glowDNA&&!m.bondFruit);
  if(candidates.length===0){notify('沒有可使用的對象！','warn');return;}
  const titles={food:'🍬 選擇餵食對象',potion:'💊 選擇回復對象',bondFruit:'🍎 選擇使用對象'};
  let html='<div style="display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto;">';
  candidates.forEach(m=>{
    const sp=SPECIES[m.speciesId];
    const isCD=!!G.battleCooldowns[m.uid];
    html+=`<div style="display:flex;align-items:center;gap:10px;background:var(--card2);border-radius:var(--radius-sm);padding:8px 10px;">
      <canvas id="pick-can-${m.uid}" width="48" height="48" style="flex-shrink:0;"></canvas>
      <div style="flex:1;">
        <div style="font-weight:800;font-size:.9rem;">${m.nickname||m.name}</div>
        <div style="font-size:.72rem;color:var(--text2);">Lv.${m.level} ${sp.name}${isCD?' ⏳冷卻中':''}${m.bondFruit&&!m.glowDNA?' 🍎磨合中':''}</div>
      </div>
      <button class="btn btn-primary" style="font-size:.78rem;padding:5px 12px;" onclick="applyItemToMonster('${key}',${m.uid})">使用</button>
    </div>`;
  });
  html+='</div>';
  showModal(titles[key]||'選擇對象', html, ()=>{
    candidates.forEach(m=>{
      const can=document.getElementById('pick-can-'+m.uid);
      if(can) drawMiniMonsterFull(m,can);
    });
  });
}
function applyItemToMonster(key,uid){
  closeModal();
  if(key==='food')      { feedMonster(uid); }
  else if(key==='potion')    { usePotion(uid); }
  else if(key==='bondFruit') { useBondFruit(uid); }

// AUDIO ENGINE
// ══════════════════════════════════════════════
let AC = null;
let bgmGain = null, sfxGain = null;
let bgmNodes = {};
let audioUnlocked = false;
let musicOn = true, sfxOn = true;

function unlockAudio() {
  if (audioUnlocked) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  bgmGain = AC.createGain(); bgmGain.gain.value = 0.18; bgmGain.connect(AC.destination);
  sfxGain = AC.createGain(); sfxGain.gain.value = 0.55; sfxGain.connect(AC.destination);
  audioUnlocked = true;
  // 啟動背景音樂
  try { startBGM(currentBGMScene || 'terrarium'); } catch(e) {}
}
document.addEventListener('click', unlockAudio, { once: true });
document.addEventListener('keydown', unlockAudio, { once: true });

// ── SFX helpers ──
function tone(freq, type, dur, vol, delay=0, fadeOut=true) {
  if (!audioUnlocked || !sfxOn) return;
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.connect(g); g.connect(sfxGain);
  o.type = type; o.frequency.value = freq;
  const t = AC.currentTime + delay;
  g.gain.setValueAtTime(vol, t);
  if (fadeOut) g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur + 0.01);
}
function noise(dur, vol, delay=0) {
  if (!audioUnlocked || !sfxOn) return;
  const buf = AC.createBuffer(1, AC.sampleRate * dur, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource();
  const g = AC.createGain();
  const f = AC.createBiquadFilter();
  f.type = 'bandpass'; f.frequency.value = 800;
  src.buffer = buf; src.connect(f); f.connect(g); g.connect(sfxGain);
  const t = AC.currentTime + delay;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.start(t); src.stop(t + dur + 0.01);
}

// ── BGM 設定 ──
// 場景音樂對應表：key = 場景名稱, value = mp3 檔名（與 HTML 同資料夾）
// BGM_FILES now driven by MUSIC_CONFIG from species.js
function getBGMFileFromConfig(scene) {
  try {
    const cfg = (typeof MUSIC_CONFIG !== 'undefined') ? MUSIC_CONFIG : {};
    const musicDir = (typeof ASSET_CONFIG !== 'undefined' && ASSET_CONFIG.musicDir) ? ASSET_CONFIG.musicDir : 'assets/music/';
    // Check scene-specific first
    const sceneCfg = cfg[scene];
    if(sceneCfg && sceneCfg.file && sceneCfg.file.trim()) {
      return { path: musicDir + sceneCfg.file.trim(), volume: sceneCfg.volume || 0.35 };
    }
    // Fall back to default
    const defCfg = cfg['default'];
    if(defCfg && defCfg.file && defCfg.file.trim()) {
      return { path: musicDir + defCfg.file.trim(), volume: defCfg.volume || 0.35 };
    }
  } catch(e) {}
  return null;
}

let currentBGMAudio = null;  // 目前播放中的 <audio> 元素

function getBGMFile(scene) {
  return getBGMFileFromConfig(scene);
}

function stopAllBGM() {
  if (currentBGMAudio) {
    currentBGMAudio.pause();
    currentBGMAudio.currentTime = 0;
    currentBGMAudio = null;
  }
  // 停掉所有舊的 Web Audio 節點（如果有的話）
  Object.values(bgmNodes).forEach(n => { try { if(n.stop) n.stop(); else clearTimeout(n); } catch(e){} });
  bgmNodes = {};
}

function fadeOutBGM(audio, duration, onDone) {
  if (!audio) { onDone && onDone(); return; }
  const startVol = audio.volume;
  const steps = Math.ceil(duration / 50);
  const step = startVol / steps;
  let count = 0;
  const timer = setInterval(() => {
    count++;
    audio.volume = Math.max(0, startVol - step * count);
    if (count >= steps) {
      clearInterval(timer);
      audio.pause();
      audio.currentTime = 0;
      onDone && onDone();
    }
  }, 50);
}

function fadeInBGM(audio, targetVol, duration) {
  audio.volume = 0;
  audio.play().catch(() => {
    const retry = () => { audio.play().catch(()=>{}); document.removeEventListener('click', retry); };
    document.addEventListener('click', retry);
  });
  const steps = Math.ceil(duration / 50);
  const step = targetVol / steps;
  let count = 0;
  const timer = setInterval(() => {
    count++;
    audio.volume = Math.min(targetVol, step * count);
    if (count >= steps) clearInterval(timer);
  }, 50);
}

function startBGM(scene) {
  try {
    if (!musicOn) return;
    const file = getBGMFile(scene);
    if (!file) return;
    const fileInfo = typeof file === 'object' ? file : { path: file, volume: 0.35 };
    if (currentBGMAudio && currentBGMAudio._scene === scene) return;
    if (currentBGMAudio && currentBGMAudio._file === fileInfo.path && !currentBGMAudio.paused) return;
    // 清掉 Web Audio 節點（舊版相容）
    Object.values(bgmNodes).forEach(n => { try { if(n.stop) n.stop(); else clearTimeout(n); } catch(e){} });
    bgmNodes = {};
    const newAudio = new Audio(fileInfo.path);
    newAudio.loop = true;
    newAudio._scene = scene;
    newAudio._file = fileInfo.path;
    const oldAudio = currentBGMAudio;
    currentBGMAudio = newAudio;
    fadeOutBGM(oldAudio, 500, () => {
      fadeInBGM(newAudio, fileInfo.volume || 0.35, 500);
    });
  } catch(e) { /* 音樂錯誤不影響遊戲 */ }
}

// scheduleNote 保留給音效使用
function scheduleNote(freq, start, dur, vol, type='sine') {
  if (!AC || !sfxOn) return null;
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.connect(g); g.connect(sfxGain);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0, start);
  g.gain.linearRampToValueAtTime(vol, start + 0.02);
  g.gain.setValueAtTime(vol, start + dur - 0.05);
  g.gain.linearRampToValueAtTime(0, start + dur);
  o.start(start); o.stop(start + dur + 0.01);
  return o;
}

// ── Music toggle button ──
function toggleMusic() {
  musicOn = !musicOn;

  if (btn) btn.innerHTML = musicOn ? getIconHtml(ASSET_CONFIG.uiDir+'audio_music_on.png','🎵',20,20) : getIconHtml(ASSET_CONFIG.uiDir+'audio_music_off.png','🔇',20,20);
  if (musicOn) {
    // 重新播放目前場景音樂
    const scene = currentBGMScene || 'terrarium';
    const fileInfo = getBGMFile(scene);
    if (fileInfo) {
      const audio = new Audio(fileInfo.path);
      audio.loop = true; audio.volume = fileInfo.volume || 0.35;
      audio._scene = scene; audio._file = fileInfo.path;
      audio.play().catch(()=>{});
      currentBGMAudio = audio;
    }
  } else {
    if (currentBGMAudio) { currentBGMAudio.pause(); }
  }
}
