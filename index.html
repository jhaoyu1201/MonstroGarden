<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monstro Garden 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root{--grass:#4ecb71;--fire:#ff6b35;--water:#4a9eff;--electric:#ffd700;--dark:#8b5cf6;--light:#fbbf24;--bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--card:#1e2a4a;--card2:#253354;--text:#e8eaf6;--text2:#9ca3c8;--text3:#6b7ab5;--gold:#ffd700;--pink:#ff6b9d;--teal:#00d4b8;--radius:16px;--radius-sm:10px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'M PLUS Rounded 1c','Nunito',sans-serif;background:var(--bg) url('assets/ui/bg_landscape.png') center/cover no-repeat;color:var(--text);min-height:100vh;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;}
@media(max-width:480px){body{background-image:url('assets/ui/bg_portrait.png');background-size:cover;}}
@media(min-width:769px){
  #app{max-width:1360px;}
  #sidebar{width:110px;padding:16px 8px;gap:8px;}
  .nav-btn{width:94px;height:60px;font-size:.72rem;}
  .nav-btn .icon{font-size:1.6rem;}
  #battle-canvas-wrap{max-width:520px;}
  #page-terrarium.active{align-items:center;gap:12px;}
  #page-terrarium #terrarium-canvas-wrap{max-width:640px;width:100%;}
  #page-terrarium #terrarium-monster-list{max-width:640px;width:100%;justify-content:center;}
  #battle-main{min-width:0;}
  #battle-arena{display:grid;grid-template-columns:clamp(300px,55%,520px) 1fr;gap:8px 16px;align-items:start;}
  #battle-canvas-wrap{grid-column:1;grid-row:1;}
  #battle-hp-bars{grid-column:1;grid-row:2;}
  #battle-log{grid-column:2;grid-row:1/3;height:0;min-height:180px;align-self:stretch;overflow-y:auto;}
  #battle-result-btns{grid-column:1/-1;grid-row:3;}
}
#header{background:var(--bg2);border-bottom:2px solid var(--bg3);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;gap:10px;}
#header h1{font-family:'Fredoka One',cursive;font-size:1.5rem;background:linear-gradient(135deg,#4ecb71,#4a9eff,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
#header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
#stardust-display{display:flex;align-items:center;gap:5px;background:var(--card);padding:5px 12px;border-radius:20px;font-weight:700;color:var(--gold);font-size:.9rem;}
.inv-chip{display:flex;align-items:center;gap:4px;background:var(--card);padding:5px 10px;border-radius:20px;cursor:pointer;transition:all .15s;border:1px solid transparent;user-select:none;}
.inv-chip:hover{background:var(--card2);border-color:var(--teal);}
.inv-chip .ic-icon{font-size:.95rem;line-height:1;}
.inv-chip .ic-val{font-size:.85rem;font-weight:800;color:var(--text);min-width:14px;text-align:center;}
.inv-chip.zero .ic-val{color:var(--text3);}
.inv-chip.low .ic-val{color:#ff6b35;}
.inv-chip{display:flex;align-items:center;gap:4px;background:var(--card);padding:5px 10px;border-radius:20px;font-weight:700;font-size:.85rem;cursor:pointer;transition:background .15s;white-space:nowrap;}
.inv-chip:hover{background:var(--bg3);}
.inv-chip .ic-icon{font-size:1rem;}
.inv-chip .ic-val{font-size:.85rem;}
.inv-chip.zero{opacity:.45;}
.bag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;padding:4px 0;}
.bag-item-card{background:var(--card);border-radius:var(--radius);padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;border:1.5px solid var(--card2);transition:border-color .2s;}
.bag-item-card.has-items{border-color:var(--teal);}
.bag-item-card.empty{opacity:.45;}
.bag-item-name{font-weight:800;font-size:.9rem;text-align:center;}
.bag-item-qty{background:var(--bg3);border-radius:20px;padding:2px 10px;font-size:.8rem;font-weight:800;color:var(--teal);}
.bag-item-qty.zero{color:var(--text3);}
.bag-item-desc{font-size:.7rem;color:var(--text2);text-align:center;line-height:1.45;flex:1;}
#main{display:flex;flex:1;overflow:hidden;}
#sidebar{width:72px;background:var(--bg2);border-right:2px solid var(--bg3);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:6px;flex-shrink:0;}
#content{flex:1;overflow:hidden;position:relative;}
.nav-btn{width:52px;height:52px;border-radius:14px;border:none;background:transparent;color:var(--text2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:.55rem;font-family:'M PLUS Rounded 1c','Nunito',sans-serif;font-weight:700;transition:all .2s;}
.nav-btn .icon{font-size:1.4rem;}
.nav-btn:hover{background:var(--card);color:var(--text);}
.nav-btn.active{background:var(--bg3);color:var(--teal);}
.nav-btn.dev-on{background:#1a2a1a;color:#4ecb71;border:1.5px solid #4ecb71;}
.page{display:none;width:100%;height:100%;overflow-y:auto;padding:20px;}
.page.active{display:flex;flex-direction:column;}
#terrarium-canvas-wrap{position:relative;width:100%;aspect-ratio:16/9;max-width:520px;flex-shrink:0;background:linear-gradient(180deg,#0d1b3e 0%,#0f2a1e 60%,#1a3a1a 100%);border-radius:var(--radius);overflow:hidden;border:2px solid var(--bg3);}
#terrarium-canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
#terrarium-ui{position:absolute;top:10px;right:10px;display:flex;gap:8px;}
#terrarium-monster-list{display:flex;gap:8px;padding:4px 0;overflow-x:auto;}
.t-info-card{flex:1;min-width:70px;max-width:120px;background:var(--card);border-radius:var(--radius-sm);padding:8px 6px;cursor:pointer;border:1.5px solid var(--card2);display:flex;flex-direction:column;align-items:center;gap:3px;transition:border-color .2s;}
.t-info-card:hover{border-color:var(--teal);}
.t-info-card.depressed{opacity:.6;filter:grayscale(.6);}
.t-info-card.awakened{box-shadow:0 0 10px var(--bond-glow,rgba(255,215,0,0.35));border-color:var(--bond-glow-solid,var(--gold));}
.tic-name{font-size:.7rem;font-weight:700;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}
.tic-level{font-size:.6rem;color:var(--text2);text-align:center;}
.tic-status{font-size:.65rem;text-align:center;}
.t-btn{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);color:#fff;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:.8rem;font-family:'M PLUS Rounded 1c','Nunito',sans-serif;font-weight:700;}
.t-btn:hover{background:rgba(255,255,255,.15);}
.monster-card{background:var(--card);border-radius:var(--radius);padding:14px;border:1.5px solid var(--card2);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.monster-card:hover{border-color:var(--teal);transform:translateY(-2px);}
.monster-card.shiny{border-color:var(--gold)!important;}
.monster-card.shiny::before{content:'✨';position:absolute;top:6px;right:6px;font-size:1rem;}
.monster-card.depressed{opacity:.6;filter:grayscale(.7);}
.monster-card canvas{display:block;margin:0 auto 8px;}
.monster-card .m-name{font-weight:800;font-size:.95rem;text-align:center;}
.monster-card .m-level{text-align:center;font-size:.75rem;color:var(--text2);}
.monster-card .m-status{text-align:center;font-size:.7rem;margin-top:4px;}
.rarity-1{border-top:3px solid #9ca3c8;}.rarity-2{border-top:3px solid #4a9eff;}.rarity-3{border-top:3px solid #8b5cf6;}.rarity-4{border-top:3px solid var(--gold);}.rarity-5{border-top:3px solid var(--pink);}
.monster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;}
.sec-title{font-family:'M PLUS Rounded 1c',sans-serif;font-size:1.3rem;color:var(--teal);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.stat-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.stat-label{width:36px;font-size:.7rem;color:var(--text2);font-weight:700;}
.stat-bar-bg{flex:1;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;}
.stat-bar{height:100%;border-radius:4px;transition:width .3s;}
.stat-val{width:28px;font-size:.7rem;font-weight:700;text-align:right;}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:10000;align-items:center;justify-content:center;}
#modal-overlay.open{display:flex;}
#modal-box{background:var(--bg2);border-radius:var(--radius);padding:24px;max-width:420px;width:90%;border:2px solid var(--bg3);max-height:85vh;overflow-y:auto;}
#modal-box h2{font-family:'M PLUS Rounded 1c',sans-serif;font-size:1.4rem;color:var(--teal);margin-bottom:16px;}
.modal-close{float:right;background:none;border:none;color:var(--text2);font-size:1.4rem;cursor:pointer;margin-top:-4px;}
.btn{padding:10px 20px;border-radius:20px;border:none;font-family:'M PLUS Rounded 1c','Nunito',sans-serif;font-weight:800;cursor:pointer;font-size:.9rem;transition:all .15s;}
.btn-primary{background:linear-gradient(135deg,var(--teal),#4a9eff);color:#fff;}
.btn-primary:hover{transform:scale(1.03);}
.btn-secondary{background:var(--card2);color:var(--text);}
.btn-secondary:hover{background:var(--bg3);}
.btn-danger{background:linear-gradient(135deg,#ff4757,#ff6b9d);color:#fff;}
.btn-gold{background:linear-gradient(135deg,var(--gold),#ff9f43);color:#1a1a2e;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}
#battle-canvas-wrap{position:relative;width:100%;max-width:520px;aspect-ratio:64/30;background:linear-gradient(180deg,#0a0a1e 0%,#1a0a2e 50%,#0a1a0e 100%);border-radius:var(--radius);overflow:hidden;border:2px solid var(--bg3);flex-shrink:0;}
#battle-canvas{width:100%;height:100%;display:block;}
.battle-log{background:var(--card);border-radius:var(--radius-sm);padding:12px;height:120px;overflow-y:auto;font-size:.8rem;line-height:1.8;flex-shrink:0;}
.battle-log p{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.log-hit{color:#ff6b35;}.log-miss{color:var(--text2);}.log-crit{color:var(--gold);font-weight:700;}
.log-win{color:var(--teal);font-weight:700;}.log-lose{color:#ff4757;font-weight:700;}
.npc-card{background:var(--card);border-radius:var(--radius-sm);padding:12px;border:1.5px solid var(--card2);cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:12px;}
.npc-card:hover{border-color:var(--teal);}
.shop-item{background:var(--card);border-radius:var(--radius-sm);padding:16px;border:1.5px solid var(--card2);display:flex;align-items:center;gap:14px;}
.breed-slot{background:var(--card);border-radius:var(--radius-sm);padding:14px;border:2px dashed var(--card2);text-align:center;cursor:pointer;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:border-color .2s;}
.breed-slot:hover{border-color:var(--pink);}
.breed-slot.filled{border-style:solid;border-color:var(--pink);}
.egg-progress{background:var(--card);border-radius:var(--radius-sm);padding:14px;border:1.5px solid var(--card2);}
.progress-bar-bg{height:10px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden;margin-top:8px;}
.progress-bar{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--pink),var(--gold));transition:width .5s;}
.dex-entry{background:var(--card);border-radius:var(--radius-sm);padding:10px;text-align:center;border:1.5px solid var(--card2);}
.dex-entry.undiscovered{filter:brightness(.3);}
.dex-entry canvas{display:block;margin:0 auto;}
.dex-entry .dex-name{font-size:.75rem;font-weight:700;margin-top:4px;}
.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.tab{padding:8px 16px;border-radius:20px;border:1.5px solid var(--card2);background:transparent;color:var(--text2);cursor:pointer;font-family:'M PLUS Rounded 1c','Nunito',sans-serif;font-weight:700;font-size:.85rem;transition:all .2s;}
.tab.active{background:var(--bg3);color:var(--teal);border-color:var(--teal);}
#notify{position:fixed;top:70px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.notif{background:var(--bg2);border:1.5px solid var(--teal);border-radius:var(--radius-sm);padding:10px 16px;font-size:.85rem;font-weight:700;animation:slideIn .3s ease;max-width:280px;}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.attr-badge{padding:3px 10px;border-radius:10px;font-size:.7rem;font-weight:800;display:inline-block;}
.attr-grass{background:#1a3a1a;color:#4ecb71;}.attr-fire{background:#3a1a0a;color:#ff6b35;}.attr-water{background:#0a1a3a;color:#4a9eff;}.attr-electric{background:#3a3a0a;color:#ffd700;}.attr-dark{background:#2a1a3a;color:#8b5cf6;}.attr-light{background:#3a3a1a;color:#fbbf24;}.attr-earth{background:#2a1e0a;color:#b5894a;}
.passive-slot{display:flex;align-items:flex-start;gap:8px;background:var(--card2);border-radius:8px;padding:7px 10px;margin-bottom:4px;border:1px solid var(--bg3);}
.passive-slot .ps-icon{font-size:1.1rem;flex-shrink:0;}
.passive-slot .ps-info{flex:1;min-width:0;}
.passive-slot .ps-name{font-weight:800;font-size:.8rem;color:var(--text);}
.passive-slot .ps-desc{font-size:.7rem;color:var(--text2);margin-top:2px;line-height:1.3;}
.passive-slot.ps-empty{opacity:.45;}
.ps-tag{font-size:.65rem;padding:1px 6px;border-radius:6px;background:var(--bg3);color:var(--text3);margin-right:4px;vertical-align:middle;}
.ps-tag.inn{background:#1a2a3a;color:var(--teal);}
.ps-tag.free{background:#1a3a1a;color:#4ecb71;}
.empty-state{text-align:center;padding:40px;color:var(--text2);}
.empty-state .big{font-size:3rem;margin-bottom:12px;}
hr{border:none;border-top:1px solid var(--card2);margin:14px 0;}
.select-check{position:absolute;top:6px;left:6px;width:20px;height:20px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#000;font-weight:800;}
.evo-badge{position:absolute;bottom:6px;right:6px;background:linear-gradient(135deg,var(--gold),var(--pink));color:#000;font-size:.6rem;font-weight:800;padding:2px 6px;border-radius:8px;}
.bond-title{font-size:.58rem;font-weight:800;color:var(--gold);text-align:center;line-height:1.3;margin-bottom:2px;padding:1px 5px;background:rgba(255,215,0,0.13);border-radius:4px;letter-spacing:.02em;}
.bond-progress-tag{font-size:.58rem;font-weight:700;color:#4ecb71;text-align:center;margin-top:2px;letter-spacing:.02em;}
.monster-card.awakened{box-shadow:0 0 14px var(--bond-glow,rgba(255,215,0,0.35));border-color:var(--bond-glow-solid,var(--gold));}
.bond-section{background:rgba(255,215,0,0.07);border:1px solid rgba(255,215,0,0.25);border-radius:8px;padding:10px 12px;margin-bottom:12px;}
.bond-section-awake{background:rgba(0,212,184,0.07);border:1px solid rgba(0,212,184,0.3);border-radius:8px;padding:10px 12px;margin-bottom:12px;}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>🌿 Monstro Garden</h1>
    <div id="header-right">
      <div id="stardust-display">✨ <span id="stardust-val">0</span></div>
      <div style="display:flex;gap:4px;margin-left:4px;">
        <button id="music-btn" onclick="toggleMusic()" title="背景音樂" style="width:32px;height:32px;border-radius:50%;border:1px solid var(--card2);background:var(--card);color:#e8eaf6;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:all .15s;">🎵</button>
        <button id="sfx-btn" onclick="toggleSFX()" title="音效" style="width:32px;height:32px;border-radius:50%;border:1px solid var(--card2);background:var(--card);color:#e8eaf6;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:all .15s;">🔊</button>
      </div>
    </div>
  </div>
  <div id="splash-screen" style="display:none;position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#0d1b2a 0%,#1a2e1a 60%,#0a1a0a 100%);flex-direction:column;align-items:center;justify-content:center;gap:24px;">
    <div style="font-size:2.8rem;font-weight:900;letter-spacing:.04em;color:#a8edaf;text-shadow:0 0 24px rgba(100,230,120,0.5);">🌱 MonstroGarden</div>
    <div id="splash-buttons" style="display:flex;flex-direction:column;gap:12px;width:280px;">
      <button id="splash-continue" class="btn btn-primary" style="padding:14px;font-size:1rem;" onclick="startFromLocal()">
        ▶ 繼續遊戲<br><small id="splash-save-time" style="font-size:.75rem;opacity:.75;"></small>
      </button>
      <button class="btn btn-secondary" style="padding:12px;font-size:.95rem;" onclick="startNewGame()">🌿 開新遊戲</button>
      <button class="btn" style="padding:12px;font-size:.95rem;background:var(--card2);" onclick="showAuthModal()">👤 帳號登入</button>
      <button class="btn" style="padding:12px;font-size:.95rem;background:var(--card2);" onclick="showSplashImport()">📥 代碼繼承</button>
    </div>
    <div id="splash-import-box" style="display:none;width:280px;">
      <textarea id="splash-import-input" style="width:100%;height:80px;background:var(--card2);color:#e8eaf6;border:1px solid var(--card2);border-radius:8px;padding:8px;font-size:.8rem;resize:none;" placeholder="貼上存檔代碼..."></textarea>
      <button class="btn btn-primary" style="width:100%;margin-top:6px;" onclick="doSplashImport()">匯入並開始</button>
    </div>
  </div>
  <div id="main">
    <div id="sidebar">
      <button class="nav-btn active" onclick="showPage('terrarium')" id="nav-terrarium"><span class="icon">🏠</span>飼養箱</button>
      <button class="nav-btn" onclick="showPage('warehouse')" id="nav-warehouse"><span class="icon">📦</span>倉庫</button>
      <button class="nav-btn" onclick="showPage('battle')" id="nav-battle"><span class="icon">⚔️</span>戰鬥</button>
      <button class="nav-btn" onclick="showPage('breeding')" id="nav-breeding"><span class="icon">💕</span>育種</button>
      <button class="nav-btn" onclick="showPage('shop')" id="nav-shop"><span class="icon">🛒</span>商店</button>
      <button class="nav-btn" onclick="showPage('pokedex')" id="nav-pokedex"><span class="icon">📖</span>圖鑑</button>
      <button class="nav-btn" onclick="showPage('bag')" id="nav-bag"><span class="icon">🎒</span>背包</button>
      <div style="flex:1"></div>
      <button class="nav-btn" onclick="closeModal();setTimeout(redeemCode,100)" id="nav-redeem"><span class="icon">🎁</span>兌換碼</button>
      <button class="nav-btn" onclick="showSaveMenu()"><span class="icon">💾</span>存檔</button>
      <button class="nav-btn" id="nav-logout" style="display:none;" onclick="doLogout()"><span class="icon">🚪</span>登出</button>
      <button class="nav-btn" onclick="doQuitGame()" style="color:#ff6b6b;"><span class="icon">⏻</span>退出遊戲</button>
      <button class="nav-btn dev-mode-toggle" id="dev-mode-btn" onclick="toggleDevMode()" title="開發者模式"><span class="icon">🛠</span>開發</button>
    </div>
    <div id="content">
      <div class="page active" id="page-terrarium">
        <div class="sec-title">🏠 飼養箱 <span style="font-size:.85rem;color:var(--text2);font-family:'Nunito',sans-serif;" id="terrarium-count"></span></div>
        <div id="terrarium-canvas-wrap">
          <canvas id="terrarium-canvas" style="cursor:pointer;"></canvas>
          <div id="terrarium-ui">
            <button class="t-btn" onclick="openManageTerrarium()">管理怪物</button>
            <button class="t-btn" onclick="feedAll()">餵食全部 🍬</button>
            <button class="t-btn" id="theme-btn" onclick="cycleTheme()">暮色紫夜</button>
          </div>
        </div>
        <div id="terrarium-monster-list"></div>
      </div>
      <div class="page" id="page-warehouse">
        <div class="sec-title">📦 倉庫 <span style="font-size:.85rem;color:var(--text2);font-family:'Nunito',sans-serif;" id="warehouse-count"></span></div>
        <div class="tabs" id="warehouse-tabs"></div>
        <div class="monster-grid" id="warehouse-grid"></div>
      </div>
      <div class="page" id="page-battle">
        <div class="sec-title">⚔️ 戰鬥</div>
        <div id="battle-main">

function loadImg(src, cb) {

// 取得進化鏈中第 steps 步的物種（steps=1→evo1, steps=2→evo2）
function getEvoSpecies(sp, steps){

function autoSpriteName(sp,k){
  const suffix=SPRITE_KEY_SUFFIX[k];if(!suffix)return null;
  return`mon_${String(sp.id).padStart(2,'0')}_${suffix}.png`;
}
// 取得 sprite 檔名（優先明確設定值，否則自動命名）
function sf(s,k){ return(s&&s.sprites&&s.sprites[k])||autoSpriteName(s,k)||null; }

function getSpritePath(sp, stage, blink, hurt, attacking) {

  if(attacking){ const f=sf(sp,'attack'); if(f) return dir+f; }
  if(hurt){ const f=sf(sp,'hurt'); if(f) return dir+f; }
  if(blink){ const f=sf(sp,'blink'); if(f) return dir+f; }

    baseShop.forEach(def=>{if(!SHOP_CONFIG.find(x=>x.id===def.id))SHOP_CONFIG.push(def);});

// ══════════════════════════════════════════════
// DRAWING ENGINE — per-species per-stage
// ══════════════════════════════════════════════
function getEvoStage(m){
  const sp=SPECIES[m.speciesId];
  if(!sp)return 0;
  if(sp.evoFrom===null&&sp.evoTo===null)return 0;
  if(sp.evoFrom!==null){
    const parent=SPECIES[sp.evoFrom];
    return(parent&&parent.evoFrom!==null)?2:1;
  }
  const lv=m.level;
  return lv>=20?2:lv>=10?1:0;
}

function drawGlowEffect(ctx,m,s,t){
  if(!m||!m.glowDNA)return;
  const{hue,scale:gs,frequency,pattern}=m.glowDNA;
  const pulse=0.65+0.35*Math.sin(t/1000*frequency*Math.PI*2);
  const ca=(a)=>`hsla(${hue},90%,65%,${a})`;
  ctx.save();
  if(pattern==='halo'){
    const r=s*gs;const grd=ctx.createRadialGradient(0,-s*0.3,0,0,-s*0.3,r);
    grd.addColorStop(0,ca(0.72*pulse));grd.addColorStop(0.5,ca(0.36*pulse));grd.addColorStop(1,ca(0));
    ctx.beginPath();ctx.ellipse(0,-s*0.3,r,r*0.82,0,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
  }else if(pattern==='flame'){
    for(let i=0;i<6;i++){
      const fy=s*(0.7+i*0.28*gs)*(0.88+0.12*Math.sin(t/200+i*1.2));
      const fx=s*0.18*Math.sin(t/280+i*0.9);
      const op=Math.max(0,(0.60-i*0.07)*(0.6+0.4*pulse));
      ctx.beginPath();ctx.ellipse(fx,-fy,s*0.22*gs,s*0.32*gs,0,0,Math.PI*2);ctx.fillStyle=ca(op);ctx.fill();
    }
  }else if(pattern==='ring'){
    const ang=t/900;const r1=s*gs*0.88;const r2=s*gs*0.66;
    ctx.save();ctx.rotate(ang);
    ctx.beginPath();ctx.ellipse(0,0,r1,r1*0.42,0,0,Math.PI*2);ctx.strokeStyle=ca(0.80*(0.7+0.3*pulse));ctx.lineWidth=s*0.11;ctx.stroke();
    ctx.rotate(-ang*1.8);
    ctx.beginPath();ctx.ellipse(0,0,r2,r2*0.38,0,0,Math.PI*2);ctx.strokeStyle=ca(0.60*(0.7+0.3*pulse));ctx.lineWidth=s*0.07;ctx.stroke();
    ctx.restore();

function drawMonsterOnCanvas(ctx,m,x,y,scale,blink,mood,flipX){
  const sp=SPECIES[m.speciesId];
  const stage=getEvoStage(m);
  const isShiny=m.isShiny;
  const s=m.size*scale*26;
  ctx.save();
  ctx.translate(x,y);
  // glow effect (behind sprite, symmetric so no flip needed)
  drawGlowEffect(ctx,m,s,Date.now());
  // shadow
  ctx.beginPath();ctx.ellipse(0,s*0.95,s*0.65,s*0.14,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fill();
  // sprite image if available, else programmatic
  const isHurt=mood==='depressed';
  const spritePath=sp?getSpritePath(sp,stage,blink,isHurt):null;
  const spritePathIdle=sp?getSpritePath(sp,stage,false,isHurt):null;
  if(spritePathIdle&&IMG_CACHE[spritePathIdle]){
    // 選擇要繪製的圖：閉眼/hurt 圖（若已載入）或待機圖
    const drawPath=(spritePath&&IMG_CACHE[spritePath])?spritePath:spritePathIdle;
    const sz=s*2;
    // 色違圖檢查（action-aware：action 色違 → idle 色違同 variant → idle 色違 v1 → hue-rotate）
    const actionKey=blink?'blink':(isHurt?'hurt':'idle');
    const _sv=m.shinyVariant||1;
    const shinyActPath =isShiny?getShinySpritePath(sp,_sv,actionKey):null;
    const shinyIdlePath=isShiny?getShinySpritePath(sp,_sv,'idle'):null;
    const shinyIdleV1  =(isShiny&&_sv>1)?getShinySpritePath(sp,1,'idle'):null;
    [shinyActPath,shinyIdlePath,shinyIdleV1].forEach(p=>{if(p&&IMG_CACHE[p]===undefined)loadImg(p,()=>{});});
    const resolvedShinyPath=
      (shinyActPath &&IMG_CACHE[shinyActPath]) ?shinyActPath :
      (shinyIdlePath&&IMG_CACHE[shinyIdlePath])?shinyIdlePath:
      (shinyIdleV1  &&IMG_CACHE[shinyIdleV1])  ?shinyIdleV1  :null;
    const useShinySprite=!!resolvedShinyPath;
    ctx.save();
    if(flipX)ctx.scale(-1,1);
    if(isShiny&&!useShinySprite){
      const hue=sp.shinyHue??ATTR_SHINY_HUE[sp.attr]??180;
      if(CTX_FILTER_SUPPORT){ctx.filter=`hue-rotate(${hue}deg) saturate(1.5)`;}
      else{ctx.shadowColor=`hsl(${hue},90%,60%)`;ctx.shadowBlur=16;}
    }
    ctx.drawImage(useShinySprite?IMG_CACHE[resolvedShinyPath]:IMG_CACHE[drawPath],-sz/2,-sz+s*0.95,sz,sz);
    ctx.filter='none';ctx.shadowBlur=0;
    ctx.restore();
    if(spritePath&&spritePath!==spritePathIdle&&IMG_CACHE[spritePath]===undefined)loadImg(spritePath,()=>{});
  }else{
    if(spritePathIdle&&IMG_CACHE[spritePathIdle]===undefined)loadImg(spritePathIdle,()=>{});
    DRAWERS[sp.id](ctx,s,stage,isShiny,blink,mood,Date.now()); // 程序繪製：DRAWER 內建 shinyStar
  }
  ctx.restore();
}

// Helper drawing functions
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function eye(ctx,ex,ey,s,blink,col){
  if(blink){ctx.beginPath();ctx.moveTo(ex-s*0.18,ey);ctx.lineTo(ex+s*0.18,ey);ctx.strokeStyle='#fff';ctx.lineWidth=s*0.09;ctx.lineCap='round';ctx.stroke();}
  else{ctx.beginPath();ctx.ellipse(ex,ey,s*0.19,s*0.21,0,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.beginPath();ctx.ellipse(ex+s*0.05,ey+s*0.02,s*0.11,s*0.12,0,0,Math.PI*2);ctx.fillStyle=col||'#1a1a2e';ctx.fill();ctx.beginPath();ctx.ellipse(ex+s*0.08,ey-s*0.02,s*0.04,s*0.04,0,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();}
}
function mouth(ctx,x,y,s,mood){
  ctx.strokeStyle='#fff';ctx.lineWidth=s*0.07;ctx.lineCap='round';
  if(mood==='happy'||mood===undefined){ctx.beginPath();ctx.arc(x,y,s*0.17,0.1,Math.PI-0.1);ctx.stroke();}
  else if(mood==='depressed'||mood==='sad'){ctx.beginPath();ctx.arc(x,y+s*0.14,s*0.17,Math.PI+0.1,-0.1);ctx.stroke();}
  else{ctx.beginPath();ctx.moveTo(x-s*0.11,y+s*0.04);ctx.lineTo(x+s*0.11,y+s*0.04);ctx.stroke();}
}
function cheeks(ctx,s,col){
  [[-0.52],[0.52]].forEach(([cx])=>{ctx.beginPath();ctx.ellipse(cx*s,s*0.08,s*0.18,s*0.12,0,0,Math.PI*2);ctx.fillStyle=(col||'#ffaacc')+'55';ctx.fill();});
}
function sparkle(ctx,px,py,r,col){ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();}
function shinyStar(ctx,s,t){
  [[s*0.95,-s*0.45],[s*-1.05,-s*0.25],[0,-s*1.1]].forEach(([px,py],i)=>{
    const r=s*0.07*(1+0.5*Math.sin(t/600+i));
    ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fillStyle='#ffd700';ctx.fill();
  });
}

function drawMiniMonster(speciesId,isShiny,size,canvas,stage){
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const m={speciesId,isShiny,size:size||1.0,level:stage===1?10:stage===2?20:1};
  drawMiniMonsterFull(m,canvas);
}

function drawMiniMonsterFull(m,canvas){
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  canvas.style.filter='';
  const sp=SPECIES[m.speciesId];
  const stage=getEvoStage(m);
  const spritePath=sp?getSpritePath(sp,stage):null;
  function _drawImg(img){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(img){
      const cw=canvas.width,ch=canvas.height;
      if(m.glowDNA){ctx.save();ctx.translate(cw/2,ch*0.58);drawGlowEffect(ctx,m,Math.min(cw,ch)*0.35,Date.now());ctx.restore();}
      const scale=Math.min(cw/img.width,ch/img.height)*0.88;
      const dw=img.width*scale,dh=img.height*scale;
      ctx.drawImage(img,(cw-dw)/2,(ch-dh)/2,dw,dh);
    }else{
      canvas.style.filter='';
      drawMonsterOnCanvas(ctx,m,canvas.width/2,canvas.height*0.58,1.0,false,'happy');
    }
  }
  if(spritePath){
    if(m.isShiny){
      // 先嘗試載入專屬色違圖（含 variant fallback）
      const shinyPath=getShinySpritePath(sp,m.shinyVariant);
      const shinyFallback=(m.shinyVariant||1)>1?getShinySpritePath(sp,1):null;
      loadImg(shinyPath,(shinyImg)=>{
        const tryFallback=()=>{
          if(shinyFallback){loadImg(shinyFallback,(fbImg)=>{if(fbImg){canvas.style.filter='';_drawImg(fbImg);}else{const hue=sp.shinyHue??ATTR_SHINY_HUE[sp.attr]??180;canvas.style.filter=`hue-rotate(${hue}deg) saturate(1.5)`;loadImg(spritePath,_drawImg);}});}
          else{const hue=sp.shinyHue??ATTR_SHINY_HUE[sp.attr]??180;canvas.style.filter=`hue-rotate(${hue}deg) saturate(1.5)`;loadImg(spritePath,_drawImg);}
        };
        if(shinyImg){canvas.style.filter='';_drawImg(shinyImg);}
        else{tryFallback();}
      });
    }else{
      loadImg(spritePath,_drawImg);
    }
  }else{
    // 程序繪製：DRAWER 內建 shinyStar，不套任何濾鏡
    drawMonsterOnCanvas(ctx,m,canvas.width/2,canvas.height*0.58,1.0,false,'happy');
  }
}

function generateMonster(spId,level=1,isShiny=false,pA=null,pB=null){
  const sp=SPECIES[spId];
  const size=parseFloat((sp.sizes[0]+Math.random()*(sp.sizes[1]-sp.sizes[0])).toFixed(2));
  const shiny=isShiny||Math.random()<(BATTLE_CONFIG.shinyChance||0.01);
  const iv=sp.ivRange||5;
  function randIV(){return randInt(-iv,iv);}
  let ivHP=randIV(),ivATK=randIV(),ivDEF=randIV(),ivAGI=randIV(),ivSPD=randIV();
  if(pA&&pB){
    const inherit=(pAv,pBv)=>Math.max(-iv,Math.min(iv,Math.round((Math.random()<0.5?pAv:pBv)+randIV()*0.5)));
    ivHP=inherit(pA.ivHP,pB.ivHP);ivATK=inherit(pA.ivATK,pB.ivATK);ivDEF=inherit(pA.ivDEF,pB.ivDEF);ivAGI=inherit(pA.ivAGI,pB.ivAGI);ivSPD=inherit(pA.ivSPD,pB.ivSPD);
  }
  const shinyVariant=shiny?Math.floor(Math.random()*(sp.shinyVariants||1))+1:undefined;
  const m={uid:G.nextId++,speciesId:spId,name:sp.name+(shiny?'✨':''),nickname:'',level,exp:EXP_TABLE[level]||0,isShiny:shiny,shinyVariant,size,ivHP,ivATK,ivDEF,ivAGI,ivSPD,hp:0,maxHP:0,mood:'happy',hunger:100,lastFed:Date.now(),passiveInnate:null,passiveFreeA:null,passiveFreeB:null};
  m.maxHP=calcStat('HP',m);m.hp=m.maxHP;
  if(typeof initPassiveSlots==='function') initPassiveSlots(m,pA,pB);
  G.discovered.add(spId);
  return m;
}

const BOND_WINS_REQUIRED=20;
const GLOW_PATTERNS=['halo','flame','ring','particle'];
const GLOW_HUE_NAMES=[
  {min:0,max:30,name:'炎紅'},{min:30,max:60,name:'琥珀'},{min:60,max:80,name:'金輝'},
  {min:80,max:150,name:'翠煌'},{min:150,max:165,name:'森羅'},{min:165,max:195,name:'蒼穹'},
  {min:195,max:225,name:'碧藍'},{min:225,max:255,name:'幽藍'},{min:255,max:285,name:'靛夜'},
  {min:285,max:315,name:'紫霞'},{min:315,max:345,name:'緋紅'},{min:345,max:361,name:'桃玉'},
];
const GLOW_FREQ_DESCS=[
  {min:0,max:1.5,adj:'靜謐的'},{min:1.5,max:3.0,adj:'悠遠的'},
  {min:3.0,max:5.5,adj:'鮮活的'},{min:5.5,max:8.1,adj:'躁動的'},
];
const GLOW_PATTERN_NAMES={halo:'靜態光暈',flame:'火焰律動',ring:'環繞光圈',particle:'星塵粒子'};
function getHueName(h){const n=GLOW_HUE_NAMES.find(x=>h>=x.min&&h<x.max);return n?n.name:'星輝';}
function getFreqDesc(f){const n=GLOW_FREQ_DESCS.find(x=>f>=x.min&&f<x.max);return n?n.adj:'靜謐的';}
function generateGlowDNA(){
  return{hue:Math.floor(Math.random()*360),scale:parseFloat((0.8+Math.random()*1.7).toFixed(2)),frequency:parseFloat((0.5+Math.random()*7.5).toFixed(2)),pattern:GLOW_PATTERNS[Math.floor(Math.random()*GLOW_PATTERNS.length)]};
}
function generateBondTitle(m,dna){return`${getFreqDesc(dna.frequency)} ${getHueName(dna.hue)} ${SPECIES[m.speciesId].name}`;}
function useBondFruit(uid){
  const m=G.monsters.find(x=>x.uid===uid);if(!m)return;
  if(m.glowDNA){notify('此寵物已覺醒，無需再使用！','warn');return;}
  if(m.bondFruit){notify('此寵物正在磨合期中！','warn');return;}
  if((G.inventory.bondFruit||0)<=0){notify('沒有羈絆果實！','warn');return;}
  G.inventory.bondFruit--;m.bondFruit=true;m.bondWins=0;
  updateInventoryChips();
  notify(`🍎 ${m.nickname||m.name} 進入羈絆磨合期！帶牠贏得${BOND_WINS_REQUIRED}場勝利吧！`,'teal');
  closeModal();refreshCurrentPage();saveGame();
}
function calcStat(stat,m){
  const sp=SPECIES[m.speciesId];
  const base={HP:sp.baseHP,ATK:sp.baseATK,DEF:sp.baseDEF,AGI:sp.baseAGI,SPD:sp.baseSPD}[stat];
  const iv={HP:m.ivHP,ATK:m.ivATK,DEF:m.ivDEF,AGI:m.ivAGI,SPD:m.ivSPD}[stat];
  const growRate = stat==='HP' ? 0.09 : 0.05;
  return Math.max(1, base + iv + Math.floor((m.level-1) * base * growRate));
}
function getStats(m){return{HP:calcStat('HP',m),ATK:calcStat('ATK',m),DEF:calcStat('DEF',m),AGI:calcStat('AGI',m),SPD:calcStat('SPD',m)};}

function addExp(m,exp){
  if(m.level>=30)return false;
  m.exp+=exp;let leveled=false;
  while(m.level<30&&m.exp>=EXP_TABLE[m.level+1]){
    m.level++;leveled=true;
    const sp=SPECIES[m.speciesId];
    if(sp.evoTo&&(m.level===10||m.level===20)){
      const ns=SPECIES[sp.evoTo];m.speciesId=sp.evoTo;m.name=ns.name+(m.isShiny?'✨':'');
      SFX.evolve();
      notify(`🎉 ${m.nickname||m.name} 進化了！外觀改變！→ ${ns.name}`,'teal');
      G.discovered.add(sp.evoTo);
    }
    // 覺醒：30%機率填充空閒自由技能槽
    if(typeof tryAwakeningSkill==='function'){
      const awoke=tryAwakeningSkill(m);
      if(awoke){const sk=typeof getSkillById==='function'?getSkillById(awoke):null;notify(`✨ ${m.nickname||m.name} 覺醒了技能：${sk?sk.name:awoke}！`,'teal');}
    }
    m.maxHP=calcStat('HP',m);if(m.hp>m.maxHP)m.hp=m.maxHP;
  }
  return leveled;
}

const TERRARIUM_W=1920,TERRARIUM_H=1080,TERRARIUM_SCALE=4.0;
const TERRARIUM_THEMES=[
  {name:'暮色紫夜', sky:['#0d0a1e','#1a0d2e','#2a1a3e'], ground:'#2a1428', grass:'#4a1a5e'},
  {name:'珊瑚海底', sky:['#020d1e','#051a3a','#0a2a4a'], ground:'#1a2a3a', grass:'#ff7043'},
  {name:'溫暖暮光', sky:['#0d0a1a','#2a1a3a','#3a2a1a'], ground:'#2a1a0a', grass:'#8b4513'},
  {name:'冰晶雪地', sky:['#020a1a','#0a1a2e','#0d2a3a'], ground:'#1a2a3a', grass:'#4a9eff'},
];
let terrariumThemeIdx=parseInt(localStorage.getItem('mg_terrarium_theme')||'0')%TERRARIUM_THEMES.length;
let terrariumDragObj=null,terrariumDragMoved=false,terrariumDragOX=0,terrariumDragOY=0;
function cycleTheme(){terrariumThemeIdx=(terrariumThemeIdx+1)%TERRARIUM_THEMES.length;localStorage.setItem('mg_terrarium_theme',terrariumThemeIdx);const btn=document.getElementById('theme-btn');if(btn)btn.textContent=TERRARIUM_THEMES[terrariumThemeIdx].name;}
function initTerrariumObjs(){
  const canvas=document.getElementById('terrarium-canvas');
  canvas.width=TERRARIUM_W;canvas.height=TERRARIUM_H;
  terrariumObjs=G.terrarium.map(uid=>{
    const m=G.monsters.find(x=>x.uid===uid);if(!m)return null;
    return{m,x:80+Math.random()*(canvas.width-160),y:60+Math.random()*(canvas.height-120),vx:(Math.random()-0.5)*0.8,vy:(Math.random()-0.5)*0.4,blinkTimer:randInt(80,200),blink:false,animPhase:Math.random()*Math.PI*2,idleTimer:randInt(60,180)};
  }).filter(Boolean);
}

function drawTBg(ctx,w,h){
  const sc=(typeof SCENE_CONFIG!=='undefined'&&SCENE_CONFIG.terrarium)?SCENE_CONFIG.terrarium:{};
  const bgFile=sc.bgFile?sc.bgFile.trim():'';
  if(bgFile){
    const scDir=(typeof ASSET_CONFIG!=='undefined'&&ASSET_CONFIG.sceneDir)?ASSET_CONFIG.sceneDir:'assets/scenes/';
    const bgPath=scDir+bgFile;
    const bgImg=IMG_CACHE[bgPath];
    if(bgImg){
      const ir=bgImg.naturalWidth/bgImg.naturalHeight,cr=w/h;
      let sx,sy,sw,sh;
      if(ir>cr){sh=bgImg.naturalHeight;sw=sh*cr;sx=(bgImg.naturalWidth-sw)/2;sy=0;}
      else{sw=bgImg.naturalWidth;sh=sw/cr;sx=0;sy=(bgImg.naturalHeight-sh)/2;}
      ctx.drawImage(bgImg,sx,sy,sw,sh,0,0,w,h);
      return;
    }else if(bgImg===undefined){loadImg(bgPath,()=>{});}
  }
  // 程式繪製背景（依目前主題）
  const _t=TERRARIUM_THEMES[terrariumThemeIdx];
  const sky=ctx.createLinearGradient(0,0,0,h);sky.addColorStop(0,_t.sky[0]);sky.addColorStop(0.6,_t.sky[1]);sky.addColorStop(1,_t.sky[2]);ctx.fillStyle=sky;ctx.fillRect(0,0,w,h);
  ctx.fillStyle='rgba(255,255,255,0.5)';for(let i=0;i<25;i++){const sx=(i*137+50)%w,sy=(i*89+20)%(h*0.45);const r=0.5+Math.sin(Date.now()/1000+i)*0.3;ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle=_t.ground;ctx.beginPath();ctx.ellipse(w/2,h+25,w*0.75,55,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=_t.grass;ctx.lineWidth=2;ctx.lineCap='round';
  for(let i=0;i<8;i++){const gx=40+i*(w/8),gy=h-8;ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx-4,gy-12);ctx.stroke();ctx.beginPath();ctx.moveTo(gx+5,gy);ctx.lineTo(gx+2,gy-10);ctx.stroke();}
}

function animateTerrariumLoop(){
  const canvas=document.getElementById('terrarium-canvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');const w=TERRARIUM_W,h=TERRARIUM_H;
  ctx.clearRect(0,0,w,h);drawTBg(ctx,w,h);
  terrariumObjs.forEach(obj=>{
    if(!obj)return;const{m}=obj;
    obj.animPhase+=0.03;const bob=Math.sin(obj.animPhase)*3;
    const isDragging=terrariumDragObj===obj;
    if(!isDragging){
      obj.idleTimer--;if(obj.idleTimer<=0){obj.vx=(Math.random()-0.5)*1.2;obj.vy=(Math.random()-0.5)*0.6;obj.idleTimer=randInt(60,200);}
      obj.x+=obj.vx;obj.y+=obj.vy;
      const margin=130;if(obj.x<margin)obj.vx=Math.abs(obj.vx);if(obj.x>w-margin)obj.vx=-Math.abs(obj.vx);if(obj.y<120)obj.vy=Math.abs(obj.vy);if(obj.y>h-80)obj.vy=-Math.abs(obj.vy);
    }
    obj.blinkTimer--;if(obj.blinkTimer<=0){obj.blink=!obj.blink;obj.blinkTimer=obj.blink?6:randInt(100,250);}
    const isCD=G.battleCooldowns[m.uid]&&G.battleCooldowns[m.uid]>Date.now();
    drawMonsterOnCanvas(ctx,m,obj.x,obj.y+(isDragging?-80:bob),TERRARIUM_SCALE,obj.blink,isCD?'depressed':'happy',obj.vx>0);
  });
  terrariumAnimFrame=requestAnimationFrame(animateTerrariumLoop);
}

function _tPos(e){const c=document.getElementById('terrarium-canvas');const r=c.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{cx:(s.clientX-r.left)*(TERRARIUM_W/r.width),cy:(s.clientY-r.top)*(TERRARIUM_H/r.height)};}
function _tNearest(cx,cy){let o=null,d=Infinity;terrariumObjs.forEach(obj=>{if(!obj)return;const hit=obj.m.size*TERRARIUM_SCALE*26*1.5;const dd=Math.hypot(cx-obj.x,cy-obj.y);if(dd<hit&&dd<d){o=obj;d=dd;}});return o;}
function onTerrariumDown(e){e.preventDefault();const{cx,cy}=_tPos(e);const obj=_tNearest(cx,cy);if(obj){terrariumDragObj=obj;terrariumDragMoved=false;terrariumDragOX=cx;terrariumDragOY=cy;obj.vx=0;obj.vy=0;}}
function onTerrariumMove(e){if(!terrariumDragObj)return;e.preventDefault();const{cx,cy}=_tPos(e);if(Math.hypot(cx-terrariumDragOX,cy-terrariumDragOY)>30)terrariumDragMoved=true;const mg=130;terrariumDragObj.x=Math.max(mg,Math.min(TERRARIUM_W-mg,cx));terrariumDragObj.y=Math.max(120,Math.min(TERRARIUM_H-80,cy));terrariumDragObj.idleTimer=90;}
function onTerrariumUp(){if(!terrariumDragObj)return;if(!terrariumDragMoved)openMonsterDetail(terrariumDragObj.m);terrariumDragObj.vx=0;terrariumDragObj.vy=0;terrariumDragObj=null;}
function initTerrariumEvents(){const c=document.getElementById('terrarium-canvas');c.addEventListener('mousedown',onTerrariumDown);c.addEventListener('touchstart',onTerrariumDown,{passive:false});window.addEventListener('mousemove',onTerrariumMove);window.addEventListener('touchmove',onTerrariumMove,{passive:false});window.addEventListener('mouseup',onTerrariumUp);window.addEventListener('touchend',onTerrariumUp);}

function feedMonster(uid){
  if(G.inventory.food<=0){notify('沒有食物！🛒','warn');SFX.click();return;}
  const m=G.monsters.find(x=>x.uid===uid);
  G.inventory.food--;m.hunger=Math.min(100,m.hunger+30);
  updateInventoryChips();
  const foodExpGain=(SHOP_CONFIG.find(x=>x.id==='food')||{expGain:50}).expGain||50;
  const lv=addExp(m,foodExpGain);
  if(lv){
    SFX.levelUp();notify(`🎉 ${m.nickname||m.name} 升到Lv.${m.level}！`,'teal');
    saveGame();updateTerrariumUI();openMonsterDetail(m); // 升級需完整刷新
  }else{
    SFX.feed();notify(`🍬 ${m.nickname||m.name} +${foodExpGain} EXP`,'teal');
    saveGame();updateTerrariumUI();
    // 只更新 EXP 條，不重建 Modal（避免圖片閃爍）
    const box=document.getElementById('modal-box');

      if(bar)bar.style.width=expPct+'%';

  }
}

// NPC_NAMES defined in species.js
function generateNPCs(diff){
  if(generatedNPCs[diff])return generatedNPCs[diff];
  const count=randInt(5,8);const npcs=[];
  for(let i=0;i<count;i++){
    const name=NPC_NAMES[randInt(0,NPC_NAMES.length-1)]+(i>0?` ${i+1}`:'');
    const numM=randInt(1,3);const monsters=[];
    for(let j=0;j<numM;j++){
      const elig=SPECIES.filter(s=>{if(diff===1)return s.rarity<=2;if(diff===2)return s.rarity<=3;if(diff===3)return s.rarity>=2&&s.rarity<=4;return s.rarity>=3;});
      const sp=elig[randInt(0,elig.length-1)];
      const minLv=[0,1,8,15,22][diff],maxLv=[0,10,18,25,30][diff];
      const nm=generateMonster(sp.id,randInt(minLv,maxLv),false);
      monsters.push(nm);
    }
    npcs.push({name,monsters,reward:diff*30+randInt(10,30)+numM*10,diff});
  }
  // 初階保證至少一個 NPC 只有 1 隻 LV1 怪物，方便新手成長
  if(diff===1&&npcs.length>0){
    const lv1sp=SPECIES.filter(s=>s.rarity<=2);
    const sp=lv1sp[randInt(0,lv1sp.length-1)];
    const lv1mon=generateMonster(sp.id,1,false);
    npcs[0].monsters=[lv1mon];
    npcs[0].reward=20+randInt(5,15);
  }
  generatedNPCs[diff]=npcs;return npcs;
}

// ── Battle particles & effects ──
let hitEffects=[];   // {x,y,color,life,maxLife,type}
let shakeFrames=0;

function spawnHitEffect(x,y,color,type,dmg){
  if(type==='crit'){
    for(let i=0;i<12;i++){hitEffects.push({x,y,vx:(Math.random()-0.5)*5,vy:-2-Math.random()*4,color,life:35,maxLife:35,type:'spark',r:3+Math.random()*3});}
    hitEffects.push({x,y,color,life:30,maxLife:30,type:'ring',r:5});
  } else if(type==='melee'){
    for(let i=0;i<7;i++){hitEffects.push({x,y,vx:(Math.random()-0.5)*3.5,vy:-1.5-Math.random()*3,color,life:25,maxLife:25,type:'spark',r:2+Math.random()*2});}
    hitEffects.push({x,y,color,life:20,maxLife:20,type:'ring',r:4});
  } else {
    for(let i=0;i<5;i++){hitEffects.push({x,y,vx:(Math.random()-0.5)*2.5,vy:-1-Math.random()*2.5,color,life:20,maxLife:20,type:'spark',r:2+Math.random()*2});}
  }
  // Damage number
  hitEffects.push({x:x+(Math.random()-0.5)*20,y:y-20,vy:-1.2,color:type==='crit'?'#ffd700':color,life:45,maxLife:45,type:'dmg',text:String(dmg),isCrit:type==='crit'});
}

function spawnAreaEffect(x,y,color,radius){
  for(let i=0;i<16;i++){const a=(i/16)*Math.PI*2;hitEffects.push({x,y,vx:Math.cos(a)*3,vy:Math.sin(a)*1.5,color,life:30,maxLife:30,type:'spark',r:3});}
  hitEffects.push({x,y,color,life:25,maxLife:25,type:'shockwave',r:radius*0.3,maxR:radius});
}

function spawnMissEffect(x,y){
  hitEffects.push({x,y,vy:-0.8,color:'#aaaaaa',life:40,maxLife:40,type:'dmg',text:'MISS',isCrit:false});
}

function spawnDeathEffect(x,y,color){
  for(let i=0;i<20;i++){const a=(i/20)*Math.PI*2;const spd=2+Math.random()*4;hitEffects.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,color,life:50,maxLife:50,type:'spark',r:3+Math.random()*4});}
  hitEffects.push({x,y,color,life:40,maxLife:40,type:'shockwave',r:5,maxR:60});
}

function drawHitEffects(ctx){
  hitEffects=hitEffects.filter(e=>{
    const pct=e.life/e.maxLife;
    if(e.type==='spark'){
      e.x+=e.vx;e.y+=e.vy;e.vy+=0.15;e.life--;
      ctx.beginPath();ctx.arc(e.x,e.y,e.r*pct,0,Math.PI*2);
      ctx.fillStyle=e.color+(Math.round(pct*255).toString(16).padStart(2,'0'));ctx.fill();
    } else if(e.type==='ring'){
      e.life--;const gr=e.r+(1-pct)*40;
      ctx.beginPath();ctx.arc(e.x,e.y,gr,0,Math.PI*2);
      ctx.strokeStyle=e.color+(Math.round(pct*180).toString(16).padStart(2,'0'));ctx.lineWidth=3*pct;ctx.stroke();
    } else if(e.type==='shockwave'){
      e.life--;const gr=e.r+(1-pct)*(e.maxR||60);
      ctx.beginPath();ctx.arc(e.x,e.y,gr,0,Math.PI*2);
      ctx.strokeStyle=e.color+(Math.round(pct*140).toString(16).padStart(2,'0'));ctx.lineWidth=4*pct;ctx.stroke();
    } else if(e.type==='dmg'){
      e.x+=(Math.random()-0.5)*0.4;e.y+=e.vy;e.life--;
      const sz=e.isCrit?22:16;
      ctx.font=`bold ${sz}px Fredoka One,Nunito,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle=e.color+(Math.round(pct*255).toString(16).padStart(2,'0'));
      if(e.isCrit){ctx.shadowColor=e.color;ctx.shadowBlur=8;}
      ctx.fillText(e.text,e.x,e.y);
      ctx.shadowBlur=0;
    }
    return e.life>0;
  });
}

// Projectile types: orbit (spiraling), bounce, homing, beam
function spawnProjectile(bt,target,sp,dmg,isCrit){
  const base={x:bt.x,y:bt.y,tx:target.x,ty:target.y,targetRef:target,color:ATTR_COLORS[sp.attr],spd:7,life:60,dmg,isCrit,hit:false,attr:sp.attr};
  if(sp.atkType==='area'){
    // Multiple projectiles fanning out
    const enemies=bt.team==='player'?battleState.enemyTeam.filter(e=>!e.dead):battleState.myTeam.filter(e=>!e.dead);
    enemies.forEach((e,i)=>{
      const p=Object.assign({},base,{tx:e.x,ty:e.y,targetRef:e,x:bt.x+(Math.random()-0.5)*10,y:bt.y+(Math.random()-0.5)*10});
      if(sp.attr==='dark'){p.type='spiral';p.angle=Math.random()*Math.PI*2;p.radius=30;}
      else if(sp.attr==='light'){p.type='beam';p.width=8;}
      else p.type='orb';
      projectiles.push(p);
    });
  } else if(sp.atkType==='ranged'){
    if(sp.attr==='electric'){base.type='bolt';base.segments=[];base.spd=9;}
    else if(sp.attr==='water'){base.type='bubble';base.wobble=0;}
    else if(sp.attr==='dark'){base.type='shadow';base.trail=[];}
    else if(sp.attr==='light'){base.type='beam';base.width=6;}
    else if(sp.attr==='grass'){base.type='leaf';base.rot=0;}
    else if(sp.attr==='fire'){base.type='fireball';base.trail=[];}
    else base.type='orb';
    projectiles.push(base);
  }
}

function updateDrawProjectiles(ctx){
  projectiles=projectiles.filter(p=>{
    if(p.hit) return false;
    // Move towards target (update tx,ty to follow moving target)
    if(p.targetRef&&!p.targetRef.dead){p.tx=p.targetRef.x;p.ty=p.targetRef.y;}
    const dx=p.tx-p.x,dy=p.ty-p.y,dist=Math.hypot(dx,dy);
    const nx=dx/Math.max(dist,1),ny=dy/Math.max(dist,1);

    if(p.type==='spiral'){
      p.angle=(p.angle||0)+0.15;p.radius=Math.max(0,(p.radius||20)-0.8);
      p.x+=nx*p.spd+Math.cos(p.angle)*p.radius*0.15;
      p.y+=ny*p.spd*0.7+Math.sin(p.angle)*p.radius*0.1;
    } else if(p.type==='bolt'){
      p.x+=nx*p.spd;p.y+=ny*p.spd;
      // Draw zigzag lightning
      ctx.beginPath();ctx.moveTo(p.x,p.y);
      let lx=p.x,ly=p.y;for(let i=0;i<4;i++){lx+=nx*8+(Math.random()-0.5)*14;ly+=ny*8+(Math.random()-0.5)*14;ctx.lineTo(lx,ly);}
      ctx.strokeStyle=p.color;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
      ctx.strokeStyle='#ffffff88';ctx.lineWidth=1;ctx.stroke();
    } else if(p.type==='bubble'){
      p.wobble=(p.wobble||0)+0.2;p.x+=nx*p.spd+Math.sin(p.wobble)*1.5;p.y+=ny*p.spd*0.8+Math.cos(p.wobble)*1.0;
      ctx.beginPath();ctx.arc(p.x,p.y,7,0,Math.PI*2);ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.stroke();
      ctx.beginPath();ctx.arc(p.x-2,p.y-2,2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();
    } else if(p.type==='shadow'){
      p.trail=p.trail||[];p.trail.push({x:p.x,y:p.y});if(p.trail.length>8)p.trail.shift();
      p.x+=nx*p.spd;p.y+=ny*p.spd;
      p.trail.forEach((pt,i)=>{const a=i/p.trail.length;ctx.beginPath();ctx.arc(pt.x,pt.y,5*a,0,Math.PI*2);ctx.fillStyle=p.color+(Math.round(a*150).toString(16).padStart(2,'0'));ctx.fill();});
      ctx.beginPath();ctx.arc(p.x,p.y,6,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();
    } else if(p.type==='beam'){
      p.x+=nx*p.spd*1.4;p.y+=ny*p.spd*1.4;
      ctx.beginPath();ctx.moveTo(p.x-nx*20,p.y-ny*20);ctx.lineTo(p.x,p.y);
      ctx.strokeStyle=p.color;ctx.lineWidth=p.width||6;ctx.lineCap='round';ctx.stroke();
      ctx.strokeStyle='#ffffff66';ctx.lineWidth=2;ctx.stroke();
      // Glow
      ctx.beginPath();ctx.moveTo(p.x-nx*20,p.y-ny*20);ctx.lineTo(p.x,p.y);
      ctx.strokeStyle=p.color+'44';ctx.lineWidth=(p.width||6)*2.5;ctx.stroke();
    } else if(p.type==='leaf'){
      p.rot=(p.rot||0)+0.25;p.x+=nx*p.spd;p.y+=ny*p.spd;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot+Math.atan2(ny,nx));
      ctx.beginPath();ctx.moveTo(0,-7);ctx.bezierCurveTo(8,-3,8,3,0,7);ctx.bezierCurveTo(-8,3,-8,-3,0,-7);ctx.fillStyle=p.color;ctx.fill();
      ctx.beginPath();ctx.moveTo(0,-6);ctx.lineTo(0,6);ctx.strokeStyle='#ffffff66';ctx.lineWidth=1;ctx.stroke();
      ctx.restore();
    } else if(p.type==='fireball'){
      p.trail=p.trail||[];p.trail.push({x:p.x,y:p.y});if(p.trail.length>10)p.trail.shift();
      p.x+=nx*p.spd;p.y+=ny*p.spd;
      p.trail.forEach((pt,i)=>{const a=i/p.trail.length;const r=7*a;ctx.beginPath();ctx.arc(pt.x,pt.y,r,0,Math.PI*2);ctx.fillStyle=['#ff6600','#ff9900','#ffcc00'][i%3]+(Math.round(a*180).toString(16).padStart(2,'0'));ctx.fill();});
      ctx.beginPath();ctx.arc(p.x,p.y,8,0,Math.PI*2);ctx.fillStyle='#ffee44';ctx.fill();
      ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();
    } else { // orb
      p.x+=nx*p.spd;p.y+=ny*p.spd;
      ctx.beginPath();ctx.arc(p.x,p.y,6,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();
      ctx.beginPath();ctx.arc(p.x,p.y,9,0,Math.PI*2);ctx.strokeStyle=p.color+'66';ctx.lineWidth=2;ctx.stroke();
      ctx.beginPath();ctx.arc(p.x-2,p.y-2,2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fill();
    }

    p.life--;
    // Hit detection
    if(dist<16||(p.type==='bolt'&&dist<20)){
      p.hit=true;
      spawnHitEffect(p.tx,p.ty,p.color,p.isCrit?'crit':'ranged',p.dmg);
      return false;
    }
    return p.life>0;
  });
}

function startBattle(){
  if(!selectedBattleMonsters.length)return;closeModal();
  const myTeam=selectedBattleMonsters.map(uid=>{
    const m=G.monsters.find(x=>x.uid===uid);const stats=getStats(m);
    return{m,stats,hp:stats.HP,maxHP:stats.HP,x:0,y:0,baseX:0,vx:0,vy:0,atkTimer:Math.random()*40,dead:false,team:'player',
      animPhase:Math.random()*Math.PI*2,dashTimer:0,dashTarget:null,hitFlash:0,attackFlashTimer:0,deathTimer:0,deathAngle:0,
      statuses:{},atkCount:0,hitCount:0,periodicTimers:{},halfHpTriggered:false,passiveFlags:{}};
  });
  const enemyTeam=currentNPC.monsters.map(m=>{
    const stats=getStats(m);
    return{m,stats,hp:stats.HP,maxHP:stats.HP,x:0,y:0,baseX:0,vx:0,vy:0,atkTimer:Math.random()*40+30,dead:false,team:'enemy',
      animPhase:Math.random()*Math.PI*2,dashTimer:0,dashTarget:null,hitFlash:0,attackFlashTimer:0,deathTimer:0,deathAngle:0,
      statuses:{},atkCount:0,hitCount:0,periodicTimers:{},halfHpTriggered:false,passiveFlags:{}};
  });
  battleState={myTeam,enemyTeam,log:[],over:false,winner:null};
  hitEffects=[];
  // Canvas will be sized after arena is shown (in requestAnimationFrame below)
  // Show arena FIRST so canvas has real dimensions
  document.getElementById('battle-select-screen').style.display='none';
  document.getElementById('battle-arena').style.display='';
  document.getElementById('battle-log').innerHTML='<p class="log-win">⚔️ 戰鬥開始！</p>';
  document.getElementById('battle-result-btns').innerHTML='';
  projectiles=[];

  // Delay one frame so the DOM has painted and clientWidth is real
  requestAnimationFrame(()=>{
    const canvas=document.getElementById('battle-canvas');
    const wrap=canvas.parentElement;
    const w=wrap.clientWidth||520;
    const h=wrap.clientHeight||Math.round(w*30/64);
    canvas.width=w; canvas.height=h;

    // Click-to-inspect: click on a battler to see their current stats
    canvas.onclick=function(e){
      if(!battleState)return;
      const rect=canvas.getBoundingClientRect();
      const cx=(e.clientX-rect.left)*(canvas.width/rect.width);
      const cy=(e.clientY-rect.top)*(canvas.height/rect.height);
      const alive=[...battleState.myTeam,...battleState.enemyTeam].filter(bt=>!bt.dead);
      if(!alive.length)return;
      const closest=alive.reduce((a,b)=>Math.hypot(cx-a.x,cy-a.y)<Math.hypot(cx-b.x,cy-b.y)?a:b);
      if(Math.hypot(cx-closest.x,cy-closest.y)<closest.m.size*30+20)showBattlerInfo(closest);
    };

    // Re-position now we know the real width
    // All members start at the same edge X, spread only in Y so everyone must walk
    const myStartX=Math.round(w*0.1);
    const enStartX=Math.round(w*0.9);
    const ySpacing=Math.min(65, Math.round(h*0.28));
    battleState.myTeam.forEach((bt,i)=>{
      bt.x=bt.baseX=myStartX;
      bt.y=h*0.5+(i-(battleState.myTeam.length-1)/2)*ySpacing;
    });
    battleState.enemyTeam.forEach((bt,i)=>{
      bt.x=bt.baseX=enStartX;
      bt.y=h*0.5+(i-(battleState.enemyTeam.length-1)/2)*ySpacing;
    });

    // 初始化被動技能（開場技能在此觸發）
    if(typeof initBattlerPassives==='function'){
      const _allBt=[...battleState.myTeam,...battleState.enemyTeam];
      _allBt.forEach(bt=>initBattlerPassives(bt,_allBt));
    }

    SFX.battleStart();
    renderBattleHPBars();
    if(battleAnimFrame)cancelAnimationFrame(battleAnimFrame);
    battleLoop();
  });
}

const STATUS_ICONS={burn:'🔥',shock:'⚡',freeze:'❄️',paralyze:'💫',wet:'💧',fear:'😨',poison:'☠️',brave:'💪',endure:'🛡️',frenzy:'💥',regen:'💚',aroused:'💢',conductive:'🔗',thorns:'🌵'};
function renderBattleHPBars(){
  if(!battleState)return;
  const cont=document.getElementById('battle-hp-bars');
  cont.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:6px;';
  cont.innerHTML='';
  function makeBarHtml(bt){
    const pct=Math.max(0,Math.round(bt.hp/bt.maxHP*100));const col=pct>50?'#4ecb71':pct>25?'#ffd700':'#ff4757';
    let statusBadges='';
    if(bt.statuses&&typeof hasStatus==='function'){
      Object.keys(STATUS_ICONS).forEach(k=>{if(hasStatus(bt,k)){const stk=bt.statuses[k]?.stacks||0;statusBadges+=`<span title="${k}" style="font-size:.65rem;padding:0 3px;background:rgba(0,0,0,.4);border-radius:4px;">${getIconHtml(ASSET_CONFIG.uiDir+'status_'+k+'.png',STATUS_ICONS[k],14,14)}${stk>1?stk:''}</span>`;}});
    }
    return `<div style="margin-bottom:4px;"><div style="font-size:.68rem;color:var(--text2);display:flex;justify-content:space-between;"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%;">${bt.m.nickname||bt.m.name}</span><span>${Math.max(0,bt.hp)}/${bt.maxHP}</span></div><div class="stat-bar-bg"><div class="stat-bar" style="width:${pct}%;background:${col};transition:width .2s;"></div></div>${statusBadges?`<div style="display:flex;gap:2px;flex-wrap:wrap;margin-top:1px;">${statusBadges}</div>`:''}</div>`;
  }
  const leftCol=document.createElement('div');
  leftCol.style.cssText='background:rgba(74,158,255,0.1);border:1px solid rgba(74,158,255,0.2);border-radius:8px;padding:6px 8px;';
  leftCol.innerHTML='<div style="font-size:.65rem;color:#4a9eff;font-weight:700;margin-bottom:4px;">💙 我方</div>';
  battleState.myTeam.forEach(bt=>{leftCol.innerHTML+=makeBarHtml(bt);});
  const rightCol=document.createElement('div');
  rightCol.style.cssText='background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.2);border-radius:8px;padding:6px 8px;';
  rightCol.innerHTML='<div style="font-size:.65rem;color:#ff4757;font-weight:700;margin-bottom:4px;">❤️ 敵方</div>';
  battleState.enemyTeam.forEach(bt=>{rightCol.innerHTML+=makeBarHtml(bt);});
  cont.appendChild(leftCol);cont.appendChild(rightCol);
}

function drawBattleBg(ctx,w,h){
  const bg=ctx.createLinearGradient(0,0,0,h);bg.addColorStop(0,'#060c20');bg.addColorStop(0.5,'#0a0f1a');bg.addColorStop(1,'#0a1508');ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);
  // Stars
  ctx.fillStyle='rgba(255,255,255,0.4)';
  for(let i=0;i<20;i++){ctx.beginPath();ctx.arc((i*157+30)%w,(i*89+10)%(h*0.4),0.6+Math.sin(Date.now()/800+i)*0.4,0,Math.PI*2);ctx.fill();}
  // Ground
  ctx.fillStyle='#1a2a0e';
  ctx.beginPath();ctx.ellipse(w/2,h+30,w*0.65,50,0,0,Math.PI*2);ctx.fill();
  // Ground line
  ctx.strokeStyle='#2d4a1a';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,h-20);ctx.lineTo(w,h-20);ctx.stroke();
  // Arena divider
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;ctx.setLineDash([5,8]);
  ctx.beginPath();ctx.moveTo(w/2,0);ctx.lineTo(w/2,h);ctx.stroke();ctx.setLineDash([]);
  // VS text
  ctx.font='bold 28px Fredoka One,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fillText('VS',w/2,h/2);
}

// Draw monster in battle: uses sprite image if available, else Canvas drawing
function drawBattleMonster(ctx,m,x,y,scale,blink,mood,flipX,attacking){
  const sp=SPECIES[m.speciesId];
  const stage=getEvoStage(m);
  const isHurt=mood==='depressed';
  const spritePath=sp?getSpritePath(sp,stage,false,isHurt,attacking):null;
  if(spritePath && IMG_CACHE[spritePath]){
    const sz=m.size*scale*52;
    const groundOff=m.size*scale*26;
    // 色違 action-aware sprite 解析
    const _bAct=attacking?'attack':(isHurt?'hurt':'idle');
    const _sv=m.shinyVariant||1;
    const bShinyAct =m.isShiny?getShinySpritePath(sp,_sv,_bAct):null;
    const bShinyIdle=m.isShiny?getShinySpritePath(sp,_sv,'idle'):null;
    const bShinyV1  =(m.isShiny&&_sv>1)?getShinySpritePath(sp,1,'idle'):null;
    [bShinyAct,bShinyIdle,bShinyV1].forEach(p=>{if(p&&IMG_CACHE[p]===undefined)loadImg(p,()=>{});});
    const resolvedShiny=
      (bShinyAct &&IMG_CACHE[bShinyAct]) ?bShinyAct :
      (bShinyIdle&&IMG_CACHE[bShinyIdle])?bShinyIdle:
      (bShinyV1  &&IMG_CACHE[bShinyV1])  ?bShinyV1  :null;
    const drawImg=resolvedShiny?IMG_CACHE[resolvedShiny]:IMG_CACHE[spritePath];
    ctx.save();ctx.translate(x,y);
    drawGlowEffect(ctx,m,m.size*scale*26,Date.now());
    if(flipX) ctx.scale(-1,1);
    if(m.isShiny&&!resolvedShiny){
      const hue=sp.shinyHue??ATTR_SHINY_HUE[sp.attr]??180;
      if(CTX_FILTER_SUPPORT){ctx.filter=`hue-rotate(${hue}deg) saturate(1.5)`;}
      else{ctx.shadowColor=`hsl(${hue},90%,60%)`;ctx.shadowBlur=12;}
    }
    ctx.drawImage(drawImg,-sz/2,-sz+groundOff,sz,sz);
    ctx.filter='none';ctx.shadowBlur=0;ctx.restore();
  } else if(spritePath && !IMG_CACHE[spritePath]){
    loadImg(spritePath,()=>{});
    drawMonsterOnCanvas(ctx,m,x,y,scale,blink,mood,flipX);
  } else {
    drawMonsterOnCanvas(ctx,m,x,y,scale,blink,mood,flipX);
  }
}

function battleLoop(){
  if(!battleState){ battleAnimFrame=null; return; }
  const canvas=document.getElementById('battle-canvas');
  if(!canvas){ battleAnimFrame=requestAnimationFrame(battleLoop); return; }

  // Check if battle page is currently visible
  const battlePageActive = document.getElementById('page-battle')?.classList.contains('active');

  // Always tick game logic regardless of visibility
  // Only draw if the page is visible and canvas has size
  const shouldDraw = battlePageActive && canvas.width>0 && canvas.height>0;
  const ctx = shouldDraw ? canvas.getContext('2d') : null;
  const w = canvas.width, h = canvas.height;

  if(shouldDraw){ ctx.clearRect(0,0,w,h); drawBattleBg(ctx,w,h); }

  // Screen shake (draw only)
  if(shouldDraw && shakeFrames>0){ctx.save();ctx.translate((Math.random()-0.5)*shakeFrames*0.8,(Math.random()-0.5)*shakeFrames*0.5);shakeFrames--;}

  if(!battleState.over){
    [...battleState.myTeam,...battleState.enemyTeam].forEach(bt=>{
      if(bt.dead)return;
      // 每幀：技能/狀態 tick
      if(typeof tickBattleStatuses==='function') tickBattleStatuses(bt);
      if(typeof applyBuffStats==='function') applyBuffStats(bt);
      if(typeof tickPeriodicSkills==='function') tickPeriodicSkills(bt,[...battleState.myTeam,...battleState.enemyTeam]);
      // 冰凍暈眩：跳過行動
      if(bt.statuses&&bt.statuses.freeze&&(bt.statuses.freeze.stunTimer||0)>0) return;
      const enemies=bt.team==='player'?battleState.enemyTeam.filter(e=>!e.dead):battleState.myTeam.filter(e=>!e.dead);
      if(!enemies.length)return;
      const target=enemies.reduce((a,b)=>Math.hypot(bt.x-a.x,bt.y-a.y)<Math.hypot(bt.x-b.x,bt.y-b.y)?a:b);
      const dx=target.x-bt.x,dy=target.y-bt.y,dist=Math.hypot(dx,dy);
      const sp=SPECIES[bt.m.speciesId];
      const atkRange=sp.atkType==='ranged'?w*0.36:sp.atkType==='area'?w*0.40:w*0.13;
      const moveSpd=0.9+bt.stats.SPD*0.03;

      // Idle bob animation
      bt.animPhase+=0.04;
      const bob=Math.sin(bt.animPhase)*3;

      // Approach enemy (only if not in attack animation)
      if(bt.dashTimer<=0){
        if(typeof hasStatus==='function'&&hasStatus(bt,'fear')&&dist>10){
          // 恐懼：向反方向逃跑
          bt.x-=(dx/dist)*moveSpd;bt.y-=(dy/dist)*moveSpd*0.5;bt.y=Math.max(35,Math.min(h-35,bt.y));
        } else if(dist>atkRange+5){
          bt.x+=(dx/dist)*moveSpd;bt.y+=(dy/dist)*moveSpd*0.5;bt.y=Math.max(35,Math.min(h-35,bt.y));
        }
      }
      // dashTimer = pure visual attack animation timer (no position change)
      if(bt.dashTimer>0) bt.dashTimer--;

      // Hit flash / attack flash decay
      if(bt.hitFlash>0)bt.hitFlash--;
      if(bt.attackFlashTimer>0)bt.attackFlashTimer--;

      // 血量閾值技能
      if(typeof triggerSkills==='function'){
        const _ht_allies=bt.team==='player'?battleState.myTeam.filter(a=>!a.dead&&a!==bt):battleState.enemyTeam.filter(a=>!a.dead&&a!==bt);
        const _ht_ctx={target,allies:_ht_allies,enemies};
        if(!bt.halfHpTriggered&&bt.hp>0&&bt.hp<=bt.maxHP*0.5){triggerSkills(bt,'health_threshold',_ht_ctx);}
        if(bt.passiveFlags&&!bt.passiveFlags.fire_free_5_triggered&&bt.hp>0&&bt.hp<=bt.maxHP*(SKILL_CONFIG?.free?.fire_free_5?.hpThreshold||0.20)){triggerSkills(bt,'health_threshold',_ht_ctx);}
      }
      bt.atkTimer-=1;
      if(bt.atkTimer<=0&&bt.dashTimer===0){
        bt.atkTimer=Math.max(20,60-bt.stats.SPD*1.5);
        bt.atkCount=(bt.atkCount||0)+1;
        if(dist<=atkRange+22){
          bt.attackFlashTimer=14; // 攻擊圖持續 14 幀
          // 麻痺：20%機率揮空
          const isParalyzed=typeof hasStatus==='function'&&hasStatus(bt,'paralyze');
          const paralyzeMiss=isParalyzed&&Math.random()<(SKILL_CONFIG?.status?.paralyze?.missChance||0.20);
          const agiChance=Math.min(BATTLE_CONFIG.maxAGIDodge||0.4, target.stats.AGI*0.015);
          const isDodge=!paralyzeMiss&&Math.random()<agiChance;
          if(paralyzeMiss){
            SFX.miss();spawnMissEffect(bt.x,bt.y-20);
            addBattleLog(`💫 ${bt.m.name} 因麻痺揮空了！`,'miss');
          } else if(isDodge){
            SFX.miss();spawnMissEffect(target.x,target.y-20);
            addBattleLog(`💨 ${bt.m.name} 的攻擊被 ${target.m.name} 閃開了！`,'miss');
            if(typeof triggerSkills==='function'){
              const _dc={attacker:bt,allies:target.team==='player'?battleState.myTeam.filter(a=>!a.dead&&a!==target):battleState.enemyTeam.filter(a=>!a.dead&&a!==target),enemies};
              triggerSkills(target,'on_dodge',_dc);
            }
          } else {
            // 潮濕屬性覆蓋
            const effectiveTAttr=(typeof hasStatus==='function'&&hasStatus(target,'wet'))?'water':SPECIES[target.m.speciesId].attr;
            const btAttr=SPECIES[bt.m.speciesId].attr;
            const isAdv=ATTR_ADVANTAGE[btAttr]&&ATTR_ADVANTAGE[btAttr].includes(effectiveTAttr);
            const _defRatio=BATTLE_CONFIG.defDampeningRatio||0.55;
            const _dmgFloor=Math.floor(bt.stats.ATK*(BATTLE_CONFIG.dmgFloorRatio||0.08));
            const dmgRef={val:Math.max(_dmgFloor,bt.stats.ATK-target.stats.DEF*_defRatio)};
            const isCrit=Math.random()<(BATTLE_CONFIG.critChance||0.1);
            if(isCrit)dmgRef.val=Math.ceil(dmgRef.val*(BATTLE_CONFIG.critMultiplier||1.5));
            if(isAdv)dmgRef.val=Math.ceil(dmgRef.val*(BATTLE_CONFIG.advMultiplier||1.5));
            // 狂暴：傷害×2（消耗）
            if(typeof hasStatus==='function'&&hasStatus(bt,'frenzy')){dmgRef.val=Math.ceil(dmgRef.val*(SKILL_CONFIG?.status?.frenzy?.dmgMulti||2.0));if(typeof clearStatus==='function')clearStatus(bt,'frenzy');}
            // 靜電屏障（on_ranged_hit，可免疫傷害）
            if(sp.atkType==='ranged'&&typeof triggerSkills==='function'){
              const _rh={attacker:bt,attackType:'ranged',dmgRef,allies:target.team==='player'?battleState.myTeam.filter(a=>!a.dead&&a!==target):battleState.enemyTeam.filter(a=>!a.dead&&a!==target),enemies};
              triggerSkills(target,'on_ranged_hit',_rh);
            }
            // status_check 傷害修正（根鬚纏繞、破曉）
            if(typeof triggerSkills==='function'){
              const _sc={target,dmgRef,allies:bt.team==='player'?battleState.myTeam.filter(a=>!a.dead&&a!==bt):battleState.enemyTeam.filter(a=>!a.dead&&a!==bt),enemies};
              triggerSkills(bt,'status_check',_sc);
              if(typeof applyLifeSharedDebuff==='function')applyLifeSharedDebuff(bt,enemies);
            }
            const dmg=Math.ceil(Math.max(dmgRef.val<=0?0:1,dmgRef.val));
            if(dmg<=0){
              addBattleLog(`🛡️ ${target.m.name} 免疫了攻擊！`,'miss');
            } else {
              target.hp=Math.max(0,target.hp-dmg);
              target.hitFlash=8;
              // 觸電：受傷時額外受到層數等量傷害
              if(typeof hasStatus==='function'&&hasStatus(target,'shock')){const shockDmg=typeof getStatusStacks==='function'?getStatusStacks(target,'shock'):0;if(shockDmg>0)target.hp=Math.max(0,target.hp-shockDmg);}
              // 荊棘：近戰/area 攻擊者受真傷
              if((sp.atkType==='melee'||sp.atkType==='area')&&typeof getStatusStacks==='function'){const tDmg=getStatusStacks(target,'thorns');if(tDmg>0){bt.hp=Math.max(0,bt.hp-tDmg);bt.hitFlash=4;}}
              if(sp.atkType==='melee'){
                bt.dashTimer=16;
                if(shakeFrames<4)shakeFrames=isCrit?6:3;
                if(isCrit)SFX.critHit();else SFX.hit();
                const kb=sp.knockback||0;
                if(kb>0){const ndx=target.x-bt.x,ndy=target.y-bt.y,nd=Math.max(1,Math.hypot(ndx,ndy));target.x=Math.max(50,Math.min(w-50,target.x+(ndx/nd)*kb));target.y=Math.max(30,Math.min(h-30,target.y+(ndy/nd)*kb*0.4));}
                spawnHitEffect(target.x,target.y,ATTR_COLORS[sp.attr],isCrit?'crit':'melee',dmg);
              } else if(sp.atkType==='area'){
                spawnProjectile(bt,target,sp,dmg,isCrit);
                spawnAreaEffect(target.x,target.y,ATTR_COLORS[sp.attr],50);
                if(shakeFrames<3)shakeFrames=isCrit?5:2;
                enemies.filter(e=>!e.dead&&e!==target).forEach(e=>{const sd=Math.ceil(dmg*0.5);e.hp=Math.max(0,e.hp-sd);e.hitFlash=6;spawnHitEffect(e.x,e.y,ATTR_COLORS[sp.attr],'ranged',sd);});
              } else {
                spawnProjectile(bt,target,sp,dmg,isCrit);
              }
              const advTxt=isAdv?' 屬性克制！':'';
              addBattleLog(`${isCrit?'💥 暴擊！':'⚔️'} ${bt.m.name} → ${target.m.name} ${dmg}傷害${isCrit?' (暴擊)':''}${advTxt}`,isCrit?'crit':'hit');
              // 攻擊觸發技能
              if(typeof triggerSkills==='function'){
                const _ac={target,attackType:sp.atkType,allies:bt.team==='player'?battleState.myTeam.filter(a=>!a.dead&&a!==bt):battleState.enemyTeam.filter(a=>!a.dead&&a!==bt),enemies};
                triggerSkills(bt,'on_attack',_ac);
                if(typeof triggerCountSkills==='function')triggerCountSkills(bt,'atkCount',_ac);
              }
              // 受擊觸發技能（近戰/area）
              if((sp.atkType==='melee'||sp.atkType==='area')&&typeof triggerSkills==='function'){
                target.hitCount=(target.hitCount||0)+1;
                const _hc={attacker:bt,attackType:sp.atkType,allies:target.team==='player'?battleState.myTeam.filter(a=>!a.dead&&a!==target):battleState.enemyTeam.filter(a=>!a.dead&&a!==target),enemies:bt.team==='player'?battleState.enemyTeam.filter(e=>!e.dead):battleState.myTeam.filter(e=>!e.dead)};
                triggerSkills(target,'on_hit_received',_hc);
                if(typeof triggerCountSkills==='function')triggerCountSkills(target,'hitCount',_hc);
              }
              // 躁動：受攻擊後20%機率反擊
              if(typeof hasStatus==='function'&&hasStatus(target,'aroused')&&!target.dead&&!bt.dead){
                const cfgA=SKILL_CONFIG?.status?.aroused;
                if(Math.random()<(cfgA?.counterChance||0.20)){const cDmg=Math.ceil(target.stats.ATK*(cfgA?.counterMulti||0.8));bt.hp=Math.max(0,bt.hp-cDmg);bt.hitFlash=6;addBattleLog(`💢 ${target.m.name} 躁動反擊 ${cDmg}傷害！`,'hit');}
              }
              // 導電：自身有導電時對其他敵方造成鏈傷
              if(typeof hasStatus==='function'&&hasStatus(bt,'conductive')){
                const cDmg=Math.ceil(bt.stats.ATK*(SKILL_CONFIG?.status?.conductive?.chainMulti||0.30));
                enemies.filter(e=>!e.dead&&e!==target).forEach(e=>{e.hp=Math.max(0,e.hp-cDmg);e.hitFlash=4;});
                if(cDmg>0)addBattleLog(`⚡ ${bt.m.name} 導電鏈傷 ${cDmg}！`,'hit');
              }
              // 大地回響：即時反擊一次
              if(bt.passiveFlags&&bt.passiveFlags.instantAttackTarget&&!bt.passiveFlags.instantAttackTarget.dead){
                const iaTgt=bt.passiveFlags.instantAttackTarget;bt.passiveFlags.instantAttackTarget=null;
                const iaDmg=Math.ceil(Math.max(1,bt.stats.ATK-iaTgt.stats.DEF*(BATTLE_CONFIG.defDampeningRatio||0.4)));
                iaTgt.hp=Math.max(0,iaTgt.hp-iaDmg);iaTgt.hitFlash=6;
                addBattleLog(`🪨 ${bt.m.name} 大地回響：即時反擊 ${iaDmg}傷害！`,'hit');
              }
              if(target.hp<=0){
                target.dead=true;target.deathTimer=40;target.deathAngle=0;
                SFX.death();
                spawnDeathEffect(target.x,target.y,ATTR_COLORS[SPECIES[target.m.speciesId].attr]);
                shakeFrames=8;
                addBattleLog(`💀 ${target.m.name} 倒下了！`,target.team==='player'?'lose':'win');
                if(typeof triggerSkills==='function'){
                  const _kc={target,allies:bt.team==='player'?battleState.myTeam.filter(a=>!a.dead&&a!==bt):battleState.enemyTeam.filter(a=>!a.dead&&a!==bt),enemies};
                  triggerSkills(bt,'on_kill',_kc);
                  const _dc={enemies:target.team==='player'?battleState.enemyTeam.filter(e=>!e.dead):battleState.myTeam.filter(e=>!e.dead),allies:target.team==='player'?battleState.myTeam.filter(a=>!a.dead&&a!==target):battleState.enemyTeam.filter(a=>!a.dead&&a!==target)};
                  triggerSkills(target,'on_death',_dc);
                }
              }
            }
          }
        }
        // 超載意志 status_check（攻擊後15%機率重置冷卻）
        if(typeof triggerSkills==='function'&&typeof _hasFreeSkill==='function'&&_hasFreeSkill(bt,'electric_free_4')){
          const _sw={target,allies:bt.team==='player'?battleState.myTeam.filter(a=>!a.dead&&a!==bt):battleState.enemyTeam.filter(a=>!a.dead&&a!==bt),enemies};
          triggerSkills(bt,'status_check',_sw);
        }
      }
    });
    const pA=battleState.myTeam.filter(b=>!b.dead).length,eA=battleState.enemyTeam.filter(b=>!b.dead).length;
    if(!pA||!eA){battleState.over=true;battleState.winner=!pA?'enemy':'player';setTimeout(()=>endBattle(),800);}
    renderBattleHPBars();
  }

  // Draw projectiles and effects (only if visible)
  if(shouldDraw && ctx){ updateDrawProjectiles(ctx); drawHitEffects(ctx); }

  // Draw monsters (only if visible)
  if(shouldDraw && ctx){
  const allBattlers=[...battleState.myTeam,...battleState.enemyTeam];
  allBattlers.sort((a,b)=>a.y-b.y);
  allBattlers.forEach(bt=>{
    // Death animation
    if(bt.dead){
      if(bt.deathTimer>0){
        bt.deathTimer--;bt.deathAngle+=0.12;
        const pct=bt.deathTimer/40;
        ctx.save();ctx.translate(bt.x,bt.y);ctx.rotate(bt.deathAngle*(bt.team==='player'?1:-1));ctx.globalAlpha=pct;
        ctx.translate(-bt.x,-bt.y);
        drawBattleMonster(ctx,bt.m,bt.x,bt.y+((1-pct)*20),0.85,false,'depressed',bt.team==='player');
        ctx.restore();
      }
      return;
    }

    const bob=Math.sin(bt.animPhase)*3;
    const isDash=bt.dashTimer>8;
    const dashLean=isDash?(bt.team==='player'?0.25:-0.25):0;

    // Shadow
    ctx.beginPath();ctx.ellipse(bt.x,bt.y+(bt.m.size*26*0.85)+bob,bt.m.size*18,5,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fill();

    // Hit flash effect
    if(bt.hitFlash>0){
      ctx.save();
      ctx.shadowColor='#ffffff';ctx.shadowBlur=20;
    }

    ctx.save();
    ctx.translate(bt.x,bt.y+bob);
    if(dashLean)ctx.rotate(dashLean);
    if(isDash){ctx.scale(1.15,0.92);}  // squash/stretch on dash
    ctx.translate(-bt.x,-bt.y-bob);
    drawBattleMonster(ctx,bt.m,bt.x,bt.y+bob,0.85,false,bt.team==='player'?'happy':'neutral',bt.team==='player',bt.attackFlashTimer>0);
    ctx.restore();

    if(bt.hitFlash>0)ctx.restore();

  });

  if(shouldDraw && shakeFrames>0) ctx.restore();
  } // end if(shouldDraw)
  battleAnimFrame=requestAnimationFrame(battleLoop);
}

function showBattlerInfo(bt){
  const STATUS_NAMES={burn:'燃燒',shock:'觸電',freeze:'冰凍',paralyze:'麻痺',wet:'潮濕',fear:'恐懼',poison:'中毒',brave:'勇敢',endure:'堅忍',frenzy:'狂暴',regen:'再生',aroused:'躁動',conductive:'導電',thorns:'荊棘'};
  const sp=SPECIES[bt.m.speciesId];
  const pct=Math.max(0,Math.round(bt.hp/bt.maxHP*100));
  const col=pct>50?'#4ecb71':pct>25?'#ffd700':'#ff4757';
  let statusHtml='';
  if(bt.statuses){
    Object.entries(bt.statuses).forEach(([k,v])=>{
      if(STATUS_NAMES[k]){
        const stacks=v.stacks||0;
        const timer=v.timer||0;
        statusHtml+=`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.07);">
          <span style="font-size:1rem;">${getIconHtml(ASSET_CONFIG.uiDir+'status_'+k+'.png',STATUS_ICONS[k]||'❓',20,20)}</span>
          <span style="font-size:.85rem;flex:1;">${STATUS_NAMES[k]}</span>
          ${stacks>0?`<span style="font-size:.75rem;color:var(--gold);font-weight:700;">×${stacks}</span>`:''}
          ${timer>0?`<span style="font-size:.7rem;color:var(--text3);">${Math.ceil(timer/60)}s</span>`:''}
        </div>`;
      }
    });
  }
  const html=`<div style="margin-bottom:12px;">
    <div style="font-size:.72rem;color:var(--text3);margin-bottom:6px;">${bt.team==='player'?'💙 我方':'❤️ 敵方'}${sp?` · ${ATTR_NAMES[sp.attr]}屬性`:''}${bt.m.level?` · Lv.${bt.m.level}`:''}</div>
    <div class="stat-row"><span class="stat-label">HP</span><div class="stat-bar-bg"><div class="stat-bar" style="width:${pct}%;background:${col};transition:none;"></div></div><span class="stat-val">${Math.floor(bt.hp)}/${bt.maxHP}</span></div>
    <div class="stat-row"><span class="stat-label">ATK</span><div class="stat-bar-bg"><div class="stat-bar" style="width:${Math.min(100,bt.stats.ATK*2)}%;background:#ff6b35;transition:none;"></div></div><span class="stat-val">${bt.stats.ATK}</span></div>
    <div class="stat-row"><span class="stat-label">DEF</span><div class="stat-bar-bg"><div class="stat-bar" style="width:${Math.min(100,bt.stats.DEF*2)}%;background:#4a9eff;transition:none;"></div></div><span class="stat-val">${bt.stats.DEF}</span></div>
    <div class="stat-row"><span class="stat-label">SPD</span><div class="stat-bar-bg"><div class="stat-bar" style="width:${Math.min(100,bt.stats.SPD*2)}%;background:#8b5cf6;transition:none;"></div></div><span class="stat-val">${bt.stats.SPD}</span></div>
  </div>
  <div style="font-size:.72rem;color:var(--text3);font-weight:700;margin-bottom:6px;letter-spacing:.03em;">🔮 當前狀態效果</div>
  ${statusHtml||'<div style="color:var(--text3);font-size:.8rem;text-align:center;padding:6px 0;">無特殊狀態</div>'}`;
  showModal(bt.m.nickname||bt.m.name,html);
}

function addBattleLog(msg,type=''){const log=document.getElementById('battle-log');if(!log)return;const p=document.createElement('p');p.className=type?'log-'+type:'';p.textContent=msg;log.appendChild(p);log.scrollTop=log.scrollHeight;}

function endBattle(){
  if(battleAnimFrame)cancelAnimationFrame(battleAnimFrame);
  const won=battleState.winner==='player';
  if(won){
    SFX.win();
    const reward=currentNPC.reward;const baseExp=currentNPC.diff*20+10;G.stardust+=reward;
    battleState.myTeam.filter(b=>!b.dead).forEach(bt=>{const lv=addExp(bt.m,baseExp+randInt(5,15));if(lv)notify(`🎉 ${bt.m.nickname||bt.m.name} 升到Lv.${bt.m.level}！`,'teal');});
    // 羈絆解放：統計勝場
    battleState.myTeam.filter(b=>!b.dead).forEach(bt=>{
      const m=bt.m;
      if(m.bondFruit&&!m.glowDNA){
        m.bondWins=(m.bondWins||0)+1;
        if(m.bondWins>=BOND_WINS_REQUIRED){
          m.glowDNA=generateGlowDNA();
          m.bondTitle=generateBondTitle(m,m.glowDNA);
          m.bondFruit=false;
          setTimeout(()=>notify(`🌟 羈絆解放！「${m.bondTitle}」誕生了！`,'teal'),400);
          addBattleLog(`🌟 ${m.nickname||m.name} 羈絆覺醒！`,'win');
        } else {
          const left=BOND_WINS_REQUIRED-m.bondWins;
          if(left<=5)notify(`🍎 ${m.nickname||m.name} 磨合進度 ${m.bondWins}/${BOND_WINS_REQUIRED}（還差${left}場！）`,'teal');
        }
      }
    });
    addBattleLog(`🏆 勝利！+${reward} 星塵！`,'win');
    const rb=document.getElementById('battle-result-btns');
    if(rb) rb.innerHTML=`<button class="btn btn-gold" onclick="endBattleScreen()">🏆 收取 +${reward}✨</button>`;
    notify(`🏆 勝利！+${reward} 星塵`,'teal');
    // If not on battle page, flash the nav button
    if(!document.getElementById('page-battle')?.classList.contains('active')){
      const btn=document.getElementById('nav-battle');
      if(btn){btn.style.background='var(--gold)';btn.style.color='#000';setTimeout(()=>{btn.style.background='';btn.style.color='';},4000);}
    }
  } else {
    SFX.lose();
    addBattleLog('💔 戰敗了...','lose');
    battleState.myTeam.filter(b=>b.dead).forEach(bt=>{G.battleCooldowns[bt.m.uid]=Date.now()+(BATTLE_CONFIG.battleCooldown||120)*1000;});
    const rb=document.getElementById('battle-result-btns');
    if(rb) rb.innerHTML=`<button class="btn btn-secondary" onclick="endBattleScreen()">💔 退出</button>`;
    notify('💔 戰鬥失敗...','warn');
  }
  updateStardust();saveGame();
}
function endBattleScreen(){
  battleState=null; projectiles=[]; hitEffects=[];
  if(battleAnimFrame){ cancelAnimationFrame(battleAnimFrame); battleAnimFrame=null; }
  const arena=document.getElementById('battle-arena');
  const sel=document.getElementById('battle-select-screen');
  if(arena) arena.style.display='none';
  if(sel) sel.style.display='';
  // If user is on another page, show a nav indicator on the battle button
  const battlePageActive=document.getElementById('page-battle')?.classList.contains('active');
  if(!battlePageActive){
    const btn=document.getElementById('nav-battle');
    if(btn){ btn.style.borderColor='var(--teal)'; setTimeout(()=>{ if(btn)btn.style.borderColor=''; },3000); }
  } else {

  }
  refreshCurrentPage();
}
